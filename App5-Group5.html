<style>
:root{
  --bg:#faf8f3;--bg2:#f5f2eb;--surface:#fff;--surface2:#fdf9f2;
  --border:#e8e2d6;--border2:#d4cbbe;
  --accent:#c0392b;--accent2:#922b21;--accent-dim:rgba(192,57,43,0.12);
  --green:#4a9e7a;--green-dim:rgba(74,158,122,0.1);
  --amber:#c8813a;--amber-dim:rgba(200,129,58,0.12);
  --red:#c0464a;--red-dim:rgba(192,70,74,0.1);
  --teal:#3a9090;--teal-dim:rgba(58,144,144,0.1);
  --text:#2c2620;--text2:#6b5f54;--text3:#a8998c;
  --sans:"Noto Sans TC",sans-serif;--r:12px;--rs:8px;
  --shadow:0 1px 4px rgba(0,0,0,0.06),0 2px 12px rgba(0,0,0,0.04);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:90px;}
/* LOGIN */
.login-screen{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 28px;max-width:480px;margin:0 auto;}
.login-screen.hidden{display:none;}
.login-logo{font-size:62px;margin-bottom:16px;}
.login-title{font-size:26px;font-weight:700;color:var(--text);margin-bottom:6px;text-align:center;}
.login-sub{font-size:18px;color:var(--text3);margin-bottom:32px;text-align:center;line-height:1.6;}
.login-field{width:100%;max-width:320px;margin-bottom:12px;}
.login-label{font-size:14px;font-weight:700;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:6px;display:block;}
.login-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:var(--sans);font-size:22px;padding:13px 14px;outline:none;transition:all .2s;}
.login-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
.login-btn{width:100%;max-width:320px;background:var(--accent);border:none;border-radius:var(--rs);color:#fff;font-family:var(--sans);font-size:21px;font-weight:700;padding:14px;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(192,57,43,0.4);}
.login-btn:active{transform:scale(.98);}
/* USER BAR */
.user-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;}
.user-name{font-size:18px;font-weight:700;color:var(--accent2);}
.user-role{font-size:16px;color:var(--text3);margin-left:6px;}
.logout-btn{font-size:19px;font-weight:700;color:var(--text3);background:none;border:1px solid var(--border2);border-radius:999px;padding:9px 20px;cursor:pointer;}
/* NOTIF */
.notif-banner{background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;border-radius:var(--rs);margin-bottom:10px;box-shadow:0 2px 12px rgba(192,57,43,0.4);animation:notifPulse 1.5s ease-in-out infinite;}
@keyframes notifPulse{0%,100%{opacity:1}50%{opacity:0.85}}
.notif-banner.hidden{display:none;}
.notif-left{display:flex;align-items:center;gap:10px;}
.notif-icon{font-size:24px;}
.notif-title{font-size:19px;font-weight:700;}
.notif-sub{font-size:16px;opacity:.9;margin-top:1px;}
/* HEADER */
.header{background:rgba(250,248,243,0.97);border-bottom:1px solid var(--border);padding:14px 16px 12px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);}
.header-top{display:flex;align-items:center;gap:11px;margin-bottom:11px;}
.logo{width:40px;height:40px;background:linear-gradient(135deg,#e8f0f5,#d4e6f0);border:1px solid var(--border2);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.header-title{font-size:22px;font-weight:700;color:var(--text);}
.header-sub{font-size:16px;color:var(--text3);margin-top:1px;}
.btn-add{background:var(--accent);border:none;border-radius:var(--rs);color:#fff;font-family:var(--sans);font-size:16px;font-weight:700;padding:8px 14px;cursor:pointer;white-space:nowrap;}
.search-wrap{position:relative;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
.search-input{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:var(--sans);font-size:20px;padding:11px 12px 11px 38px;outline:none;}
.search-input:focus{border-color:var(--accent);background:#fff;}
.search-input::placeholder{color:var(--text3);}
/* FILTERS */
.dept-wrap{padding:6px 14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;background:var(--surface2);border-bottom:1px solid var(--border);}.dept-btn{width:100%;}.filter-wrap{padding:8px 14px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;background:var(--surface2);border-bottom:1px solid var(--border);}
.dept-wrap::-webkit-scrollbar,.filter-wrap::-webkit-scrollbar{display:none;}
.dept-btn,.filter-btn{flex-shrink:0;padding:6px 14px;border-radius:999px;border:1.5px solid var(--border2);background:transparent;color:var(--text3);font-family:var(--sans);font-size:18px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.filter-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent2);font-weight:600;}
/* STATS */
.stats-bar{padding:8px 16px;display:flex;gap:8px;flex-wrap:wrap;background:var(--bg2);border-bottom:1px solid var(--border);}
.stat-pill{font-size:17px;color:var(--text3);padding:4px 12px;background:var(--surface);border:1px solid var(--border);border-radius:999px;}
.stat-pill strong{color:var(--accent2);font-weight:700;}
/* CARDS */
.cards-wrap{padding:12px 14px;display:flex;flex-direction:column;gap:12px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--surface);border:2px solid var(--border2);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);animation:fadeUp .25s ease both;cursor:pointer;border-left-width:5px;}
.card-header{padding:14px 14px 10px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.card-title{font-size:21px;font-weight:700;line-height:1.4;color:var(--text);flex:1;}
.card-chevron{color:var(--text3);flex-shrink:0;font-size:22px;}
.card-meta{padding:0 14px 12px;display:flex;flex-wrap:wrap;gap:5px;}
.badge{font-size:16px;padding:4px 10px;border-radius:5px;font-weight:600;border:1px solid transparent;}
.badge-blue{background:rgba(91,143,168,0.12);color:var(--accent2);border-color:rgba(91,143,168,0.2);}
.badge-green{background:var(--green-dim);color:var(--green);border-color:rgba(74,158,122,0.2);}
.badge-amber{background:var(--amber-dim);color:var(--amber);border-color:rgba(200,129,58,0.2);}
.badge-pos{background:rgba(168,153,140,0.1);color:var(--text2);border-color:var(--border);font-size:14px;}
.badge-pending{background:var(--amber-dim);color:var(--amber);border-color:rgba(200,129,58,0.3);font-size:13px;}
.badge-approved{background:var(--green-dim);color:var(--green);border-color:rgba(74,158,122,0.3);font-size:13px;}
.card-action-btn{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);}
/* FULLPAGE */
.fullpage{display:none;position:fixed;inset:0;background:var(--bg);z-index:150;overflow-y:auto;padding-bottom:90px;}
.fp-header{background:rgba(250,248,243,0.97);border-bottom:2px solid var(--border2);padding:12px 16px;position:sticky;top:0;z-index:10;backdrop-filter:blur(20px);display:flex;align-items:center;gap:12px;max-width:480px;margin:0 auto;}
.fp-back{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--border2);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:24px;flex-shrink:0;}
.fp-info{flex:1;min-width:0;}
.fp-dept{font-size:17px;color:var(--text3);margin-bottom:2px;}
.fp-title{font-size:22px;font-weight:700;color:var(--text);line-height:1.3;}
.fp-edit{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--border2);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);flex-shrink:0;}
.fp-body{padding:16px;max-width:480px;margin:0 auto;}
.fp-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}



.fp-record{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:5px 14px;}
.fp-record span{font-size:17px;color:var(--text3);}
.fp-record strong{color:var(--text2);font-weight:600;}
.fp-section{margin-bottom:14px;}.fp-label{font-size:17px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.fp-label::before{content:"";width:4px;height:14px;border-radius:2px;background:currentColor;opacity:.6;flex-shrink:0;}
.fp-content{font-size:23px;font-weight:700;color:var(--text2);line-height:1.9;white-space:pre-wrap;background:var(--surface);border-radius:var(--rs);padding:14px 16px;border:1.5px solid var(--border);}
.fp-tags{display:flex;flex-wrap:wrap;gap:6px;}
.fp-tag{font-size:20px;font-weight:700;padding:7px 13px;border-radius:var(--rs);background:var(--surface);border:1.5px solid var(--border2);color:var(--text2);}
.pending-notice{background:rgba(200,129,58,0.08);border:1px solid rgba(200,129,58,0.3);border-radius:var(--rs);padding:12px;margin-bottom:14px;}
.pending-title{font-size:17px;font-weight:700;color:var(--amber);margin-bottom:5px;}
.pending-sub{font-size:17px;color:var(--text2);line-height:1.5;margin-bottom:8px;}
.btn-review{background:var(--green);border:none;border-radius:6px;color:#fff;font-family:var(--sans);font-size:16px;font-weight:700;padding:8px 16px;cursor:pointer;}
.diff-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:9px 11px;margin-bottom:7px;}
.diff-label{font-size:16px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px;color:var(--text3);}
.diff-old{font-size:17px;color:var(--text3);padding:5px 8px;background:rgba(168,153,140,0.08);border-radius:4px;text-decoration:line-through;opacity:.7;margin-bottom:4px;}
.diff-new{font-size:18px;color:var(--red);padding:5px 8px;background:rgba(192,70,74,0.06);border-radius:4px;border-left:3px solid var(--red);font-weight:600;}
/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(250,248,243,0.97);border-top:1px solid var(--border);display:flex;padding:12px 16px 22px;z-index:100;backdrop-filter:blur(20px);}
.nav-item{flex:1;display:flex;flex-direction:row;align-items:center;justify-content:center;gap:8px;cursor:pointer;color:#fff;background:var(--accent);font-size:20px;font-weight:700;padding:14px;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,.15);transition:transform .12s,opacity .12s;}
.nav-item.active{color:#fff;}
.nav-item svg{width:26px;height:26px;}
.nav-item:active{transform:scale(.97);opacity:.9;}
.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-icon{font-size:46px;margin-bottom:12px;opacity:.4;}
.empty-text{font-size:17px;}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,38,32,.5);z-index:400;overflow-y:auto;padding:20px 14px;backdrop-filter:blur(6px);}
.modal-overlay.show{display:flex;align-items:flex-start;justify-content:center;}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;width:100%;max-width:448px;padding:20px;box-shadow:0 8px 40px rgba(0,0,0,.15);}
.modal-title{font-size:21px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.modal-notice{font-size:17px;color:var(--amber);background:var(--amber-dim);border-radius:6px;padding:8px 10px;margin-bottom:14px;line-height:1.5;}
.modal-close{width:28px;height:28px;border-radius:50%;background:var(--bg2);border:1px solid var(--border2);cursor:pointer;color:var(--text3);font-size:16px;display:flex;align-items:center;justify-content:center;}
.form-group{margin-bottom:12px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.form-label{font-size:16px;font-weight:700;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px;display:block;}
.form-input,.form-textarea,.form-select{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:var(--sans);font-size:22px;padding:12px 13px;outline:none;transition:all .2s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent);background:#fff;}
.form-textarea{resize:vertical;min-height:140px;line-height:1.75;overflow-y:auto;white-space:pre-wrap;word-break:break-word;}
.form-input{white-space:normal;}
.form-select option{background:#fff;}
.form-hint{font-size:16px;color:var(--text3);margin-top:3px;}
.modal-actions{display:flex;gap:9px;margin-top:16px;}
.btn-cancel{flex:1;padding:11px;border-radius:var(--rs);border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--sans);font-size:19px;cursor:pointer;}
.btn-save{flex:2;padding:11px;border-radius:var(--rs);border:none;background:var(--accent);color:#fff;font-family:var(--sans);font-size:19px;font-weight:700;cursor:pointer;}
/* REVIEW MODAL */
.review-modal{background:var(--surface);border:1.5px solid rgba(74,158,122,.3);border-radius:14px;width:100%;max-width:380px;padding:24px;box-shadow:0 8px 40px rgba(0,0,0,.15);}
.review-modal-title{font-size:19px;font-weight:700;color:var(--text);margin-bottom:4px;text-align:center;}
.review-modal-proc{font-size:16px;color:var(--text2);margin-bottom:6px;text-align:center;font-weight:600;}
.review-modal-sub{font-size:15px;color:var(--text3);margin-bottom:16px;text-align:center;}
.reviewer-list{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.reviewer-btn{padding:12px 16px;border-radius:var(--rs);border:1.5px solid var(--border2);background:var(--bg2);color:var(--text);font-family:var(--sans);font-size:19px;font-weight:500;cursor:pointer;text-align:left;}
.reviewer-btn.selected{border-color:var(--green);background:var(--green-dim);color:var(--green);font-weight:700;}
.review-actions{display:flex;gap:8px;}
.btn-review-cancel{flex:1;padding:11px;border-radius:var(--rs);border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--sans);font-size:16px;cursor:pointer;}
.btn-review-ok{flex:2;padding:11px;border-radius:var(--rs);border:none;background:var(--green);color:#fff;font-family:var(--sans);font-size:16px;font-weight:700;cursor:pointer;}
/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:#fff;font-size:18px;padding:10px 18px;border-radius:999px;z-index:400;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.c-accent{color:var(--accent2)}.c-green{color:var(--green)}.c-amber{color:var(--amber)}.c-teal{color:var(--teal)}.c-red{color:var(--red)}













.badge-ver{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;font-weight:700;letter-spacing:.04em;padding:5px 14px;border-radius:999px;box-shadow:0 2px 6px rgba(0,0,0,.12);}
.signature{position:fixed;right:16px;bottom:12px;text-align:right;pointer-events:none;z-index:5;}
.signature .by{font-family:'Great Vibes',cursive;font-size:24px;line-height:1;color:#2e7d5b;opacity:.7;}
.signature .role{font-size:10px;color:var(--text3);letter-spacing:.25em;margin-top:1px;opacity:.8;}
.login-screen{background:linear-gradient(160deg,#e3f0e8 0%,#eef4ec 38%,var(--bg) 100%) !important;}
.fullpage{background:linear-gradient(180deg,var(--accent-dim) 0%,var(--bg) 180px,var(--bg) 100%) !important;}
.app-body, body{background-attachment:fixed;}


.btn-tinted{background:var(--accent-dim) !important;border-color:var(--accent) !important;color:var(--accent2) !important;font-weight:600;}
.btn-sync{background:var(--accent) !important;border:none !important;color:#fff !important;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.12);}
.btn-logout{background:#f0ebe2 !important;border-color:var(--border2) !important;color:var(--text2) !important;font-weight:600;}

/* 醫師名字螢光筆標示 */
.dr-hl{background:linear-gradient(transparent 35%, #fff3a0 35%, #ffe95c 90%, transparent 90%);border-radius:3px;padding:0 3px;font-weight:700;color:#3a2f00;}
</style>
<script>
// 動態注冊 PWA manifest
// 醫師名字螢光筆標示用（達文西醫師）
const DR_NAMES = ['徐宇辰','熊副','龔晏萱','徐靖','柯智羣','陳柏誠','莊德彥','吳東琰','王炯珵','陳建志','陳建華','柯智群','吳昀叡','高銘鴻'];
function hlDr(text){
  if(!text) return text;
  let out = String(text);
  DR_NAMES.forEach(n=>{ out = out.split(n).join('<span class="dr-hl">'+n+'</span>'); });
  return out;
}

// 醫師習慣：每位醫師之間空一行，方便閱讀
function spaceDoctors(text){
  if(!text) return text;
  let out = String(text);
  // 斷點名單：螢光筆醫師名 + 常見通用詞（其餘醫師等）
  let names = (typeof DR_NAMES!=='undefined') ? DR_NAMES.slice() : [];
  names = names.concat(['其餘醫師','其他醫師','其它醫師','所有醫師','各醫師']);
  names.sort((a,b)=>b.length-a.length);
  names.forEach(n=>{
    const re = new RegExp('(?:Dr\\.?\\s*)?'+n.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'g');
    out = out.replace(re, m=>'\u0001'+m);
  });
  // 清掉殘留的分隔斜線（醫師段落結尾的 " / "）
  out = out.split('\u0001').map(s=>s.replace(/\s*\/\s*$/,'').trim()).filter(s=>s).join('\n\n');
  return out;
}

// 鎖定的預設審核日期（民國年）。日後整體要改版時，只改這一行即可
const DEFAULT_REVIEW_DATE = '115.06.17';
const manifestData = {
  "name": "手術室手術用物準備手冊",
  "short_name": "手術用物手冊",
  "description": "手術室手術用物準備手冊",
  "start_url": "./",
  "display": "standalone",
  "background_color": "#faf8f3",
  "theme_color": "#1abc9c",
  "icons": [
    {"src": "icon-192.png?v=4", "sizes": "192x192", "type": "image/png", "purpose": "any maskable"},
    {"src": "icon-512.png?v=4", "sizes": "512x512", "type": "image/png", "purpose": "any maskable"}
  ]
};
const blob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
const manifestURL = URL.createObjectURL(blob);
document.querySelector('link[rel="manifest"]').href = manifestURL;
</script>

async function syncToCloud(data) {
  // 同步所有有變動的資料（pending、editor、reviewer 有值，或 status 改變）
  const updates = data.filter(d => d.pending || d.editor || d.reviewer || d.status !== '已審核');
  if(updates.length === 0) return true;
  let allOk = true;
  for(const d of updates) {
    // 更新用的欄位（與原始資料表一致，不含可能不存在的 version/author）
    const updBody = {
      procedure: d.procedure, anesthesia: d.anesthesia, position: d.position,
      disinfect: d.disinfect, tools: d.tools || '', supplies: d.supplies || '',
      meds: d.meds || '', implantNotes: d.implantNotes || '', doctorHabits: d.doctorHabits || '',
      notes: d.notes || '', status: d.status, pending: d.pending || null,
      editor: d.editor || '', editorDate: d.editorDate || '',
      reviewer: d.reviewer || '', reviewDate: d.reviewDate || ''
    };
    // 新增用的欄位（POST 需要 id 與 dept）
    const insBody = { id: d.id, dept: d.dept, ...updBody };
    try {
      // 先嘗試更新（PATCH）；若雲端沒有該筆，PATCH 影響 0 列，再用 POST 新增
      const patchRes = await fetch(SUPA_URL + '/rest/v1/surgical_data?id=eq.' + d.id, {
        method: 'PATCH',
        headers: {...SUPA_HEADERS, 'Prefer':'return=representation'},
        body: JSON.stringify(updBody)
      });
      let patched = [];
      try { patched = await patchRes.json(); } catch(e){ patched = []; }
      if(!patchRes.ok) { allOk = false; continue; }
      if(!Array.isArray(patched) || patched.length === 0){
        // 雲端沒有 → 新增
        const postRes = await fetch(SUPA_URL + '/rest/v1/surgical_data', {
          method: 'POST',
          headers: {...SUPA_HEADERS, 'Prefer':'return=minimal'},
          body: JSON.stringify(insBody)
        });
        if(!postRes.ok) allOk = false;
      }
    } catch(e) { allOk = false; }
  }
  return allOk;
}

  });
}

function loadData(){
  try{
    const s = localStorage.getItem(STORAGE_KEY);
    if(s) return JSON.parse(s);
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}
async function saveData(){
  // 先存本機，確保不會白改
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA)); }catch(e){}
  showToast('✅ 已送出（本機已存）');
  // 雲端在背景同步，成功或失敗都不卡畫面
  try {
    const ok = await syncToCloud(DATA);
    if(ok) showToast('☁️ 已同步雲端，其他人可看到');
    else showToast('⚠️ 雲端同步未完成，稍後會自動重試');
    return ok;
  } catch(e) {
    showToast('⚠️ 雲端暫時無法連線，資料已存本機');
    return false;
  }
}

function isReviewer(name){ return ADMINS.includes(name) || Object.values(DEPT_REVIEWERS).some(a=>a.includes(name)); }
function canReview(name,dept){ return ADMINS.includes(name)||(DEPT_REVIEWERS[dept]||[]).includes(name); }
function getUserLabel(name){
  if(ADMINS.includes(name)) return '全科管理員';
  const depts=Object.entries(DEPT_REVIEWERS).filter(([d,a])=>a.includes(name)).map(([d])=>d);
  if(depts.length) return depts.join('、')+' 審核者';
  return '編輯者';
}

let pollTimer = null;

async function doLogin(){
  const name = document.getElementById('loginName').value.trim();
  if(!name){ showToast('請輸入姓名'); return; }
  if(!STAFF_SET.has(name)){ showToast('此姓名不在手術室人員名單中，無法登入'); return; }
  currentUser = name;
  try{ localStorage.setItem('sp_current_user', name); }catch(e){}
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainApp').style.display = 'block';
  document.getElementById('userNameDisplay').textContent = name;
  document.getElementById('userRoleDisplay').textContent = '｜' + getUserLabel(name);
  // 先用本機資料快速顯示，不等雲端
  // 先用 DEFAULT_DATA 快速顯示
  DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
  try{ const _p=new URLSearchParams(location.search).get('dept'); if(_p && GROUP_DEPT_SET.has(_p)){ currentDept=_p; lockedDept=_p; const _t=document.getElementById('hdrTitle'); if(_t)_t.textContent=_p; const _su=document.getElementById('hdrSub'); if(_su)_su.textContent='手術用物準備手冊'; } }catch(e){}
  renderAll();
  showToast('⏳ 從雲端載入資料...');
  startPolling();
  // 從 Supabase 載入完整最新資料
  loadFromCloud().then(cloudData => {
    if(!cloudData || cloudData.length === 0){
      showToast('✅ 已載入（' + DATA.length + ' 筆）');
      return;
    }
    const cloudIds = new Set(cloudData.map(d=>d.id));
    // 以雲端為主（保留使用者修改），檔案只補雲端沒有的新 id
    const newItems = DEFAULT_DATA.filter(d=> !cloudIds.has(d.id) );
    DATA = [...cloudData, ...newItems];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
    renderAll();
    showToast('✅ 已載入（' + DATA.length + ' 筆）');
    if(newItems.length > 0) syncToCloud(newItems).catch(()=>{});
  }).catch(()=>{ showToast('✅ 已載入（' + DATA.length + ' 筆）'); });
}
function doLogout(){
  stopPolling();
  currentUser = null;
  try{ localStorage.removeItem('sp_current_user'); }catch(e){}
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginName').value = '';
}

function startPolling(){
  stopPolling();
  pollTimer = setInterval(async ()=>{
    if(!currentUser) return;
    const cloudData = await loadFromCloud();
    if(!cloudData || cloudData.length === 0) return;
    // 雲端只存審核狀態，合併回 DATA
    const prevPending = DATA.filter(s=>s.pending && canReview(currentUser,s.dept)).length;
    const cloudMap = new Map(cloudData.map(d=>[d.id, d]));
    DATA = DATA.map(d=>{
      const cloud = cloudMap.get(d.id);
      if(!cloud) return d;
      return {...d, status: cloud.status||d.status, pending: cloud.pending||null,
        editor: cloud.editor||'', editorDate: cloud.editorDate||'',
        reviewer: cloud.reviewer||'', reviewDate: cloud.reviewDate||''};
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
    const nowPending = DATA.filter(s=>s.pending && canReview(currentUser,s.dept)).length;
    updateNotif();
    if(nowPending > prevPending){
      renderCards();
      showToast('🔔 有 ' + nowPending + ' 筆新增待審核術式！');
    }
  }, 30000);
}
function stopPolling(){
  if(pollTimer){ clearInterval(pollTimer); pollTimer = null; }
}

// FILTER
function getFiltered(){
  return DATA.filter(s=>{
    const dOk = lockedDept ? s.dept===lockedDept : (currentDept===''||s.dept===currentDept);
    if(!dOk) return false;
    if(!currentSearch) return true;
    const q = currentSearch.toLowerCase();
    return [s.procedure,s.anesthesia,s.position,s.dept,s.tools||'',s.supplies||'',s.notes||'',s.doctorHabits||''].some(v=>v.toLowerCase().includes(q));
  });
}

}








function renderDepts(){
  const existing = new Set(DATA.map(d=>d.dept));
  // 強制加入 DEFAULT_DATA 的科別，避免雲端舊資料讓按鈕消失
  DEFAULT_DATA.forEach(d=>existing.add(d.dept));
  if(lockedDept){ document.getElementById('deptWrap').style.display='none'; document.getElementById('deptWrap').innerHTML=''; return; }
  document.getElementById('deptWrap').innerHTML = ALL_DEPTS
    .filter(d=>d!=='全部科別'&&existing.has(d))
    .map(d=>{
      const color = DEPT_COLORS[d]||'#5b8fa8';
      const isActive = currentDept===d;
      const style = d==='全部科別'
        ? (isActive?'background:var(--teal);border-color:var(--teal);color:#fff;':'')
        : (isActive?`background:${color};border-color:${color};color:#fff;box-shadow:0 2px 8px ${color}40;`:`border-color:${color}60;color:${color};`);
      return `<button class="dept-btn" style="${style}" onclick="setDept('${d}')">${d}</button>`;
    }).join('');
}

function renderCards(){
  const f = getFiltered();
  const deptCount = currentDept===''
    ? DATA.length
    : DATA.filter(d=>d.dept===currentDept).length;
  const pendingCount = DATA.filter(d=>d.pending).length;
  let stats = `<div class="stat-pill">總計 <strong>${lockedDept?DATA.filter(d=>d.dept===lockedDept).length:DATA.length}</strong> 筆</div>`;
  if(pendingCount>0) stats += `<div class="stat-pill" style="border-color:var(--red);color:var(--red);">🔴 待審 <strong>${pendingCount}</strong></div>`;
  document.getElementById('statsBar').innerHTML = stats;
  const w = document.getElementById('cardsWrap');
  if(!f.length){ w.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">找不到符合的術式</div></div>'; return; }
  w.innerHTML = f.map((s,i)=>{
    const color = DEPT_COLORS[s.dept]||'#5b8fa8';
    return `<div class="card" id="card-${s.id}" style="animation-delay:${i*.02}s;border-left-color:${color};" onclick="openFp(${s.id})">
      <div class="card-header">

        <div class="card-chevron">›</div>
      </div>
    </div>`;
  }).join('');
}

// FULLPAGE
function toROC(d){
  // 將日期字串或Date轉民國年 115.07.01
  let dt;
  if(!d) dt=new Date();
  else if(d instanceof Date) dt=d;
  else { const t=Date.parse(d); dt=isNaN(t)?new Date():new Date(t); }
  const y=dt.getFullYear()-1911;
  const m=String(dt.getMonth()+1).padStart(2,'0');
  const day=String(dt.getDate()).padStart(2,'0');
  return y+'.'+m+'.'+day;
}
function verLabel(s){
  const v=s.version||1;
  const dt=s.reviewDate? (/^\d+\.\d/.test(s.reviewDate)? s.reviewDate : toROC(s.reviewDate)) : DEFAULT_REVIEW_DATE;
  return `<span class="badge badge-ver">${dt}　V${v}</span>`;
}

function renderFp(){
  const s=DATA.find(d=>d.id===fpId); if(!s) return;
  const color=DEPT_COLORS[s.dept]||'#5b8fa8';
  document.getElementById('fpDept').textContent=s.dept;
  document.getElementById('fpDept').style.color=color;
  document.getElementById('fpTitle').textContent=s.procedure;
  let body='';
  body+=`<div class="fp-meta">${verLabel(s)}</div>`;
 
  let rec=[];
  if(s.editor) rec.push(`<span>✏️ 修改者：<strong>${s.editor}</strong>${s.editorDate?' ('+s.editorDate+')':''}</span>`);
  if(s.reviewer) rec.push(`<span>✅ 審核者：<strong>${s.reviewer}</strong>${s.reviewDate?' ('+s.reviewDate+')':''}</span>`);
  body+=`<div class="fp-record">${rec.join('')}</div>`;
  if(s.pending){
    const canRev=canReview(currentUser,s.dept);
    let diffs='';
    const fields=[['術式名稱',s.procedure,s.pending.procedure],['麻醉方式',s.anesthesia,s.pending.anesthesia],
      ['手術姿勢',s.position,s.pending.position],['消毒方式',s.disinfect,s.pending.disinfect],
      ['工具器械',s.tools,s.pending.tools],['耗材',s.supplies,s.pending.supplies],
      ['藥物',s.meds,s.pending.meds],['備註',s.implantNotes,s.pending.implantNotes],
      ['醫生習慣',s.doctorHabits,s.pending.doctorHabits],['注意事項',s.notes,s.pending.notes]];
    fields.forEach(([label,old,nw])=>{
      if((old||'')!==(nw||''))
        diffs+=`<div class="diff-row"><div class="diff-label">${label}</div><div class="diff-old">${old||'（空白）'}</div><div class="diff-new">${nw||'（空白）'}</div></div>`;
    });
    body+=`<div class="pending-notice">
      <div class="pending-title">⏳ 待審核的修改內容</div>
      <div class="pending-sub">✏️ 修改者：<strong>${s.pending.editor}</strong>（${s.pending.editorDate}）</div>
      ${diffs||'<div style="font-size:15px;color:var(--text3)">（無欄位變更）</div>'}
      ${canRev?`<button class="btn-review" onclick="openReview(${s.id})">✅ 審核通過，正式公佈</button>`:'<div style="font-size:14px;color:var(--text3);margin-top:8px;">（需等待本科審核者審核）</div>'}
    </div>`;
  }
  body+=`
      <div class="fp-section"><div class="fp-label c-amber">姿勢</div><div class="fp-content">${s.position||'—'}</div></div>
      <div class="fp-section"><div class="fp-label c-teal">消毒方式</div><div class="fp-content">${s.disinfect||'—'}</div></div>
      ${s.tools?`<div class="fp-section"><div class="fp-label c-accent">工具 ／ 器械</div><div class="fp-tags">${s.tools.split(/ \/ /).map(t=>`<span class="fp-tag">${t.trim()}</span>`).join('')}</div></div>`:''}
      ${s.supplies?`<div class="fp-section"><div class="fp-label c-green">耗材</div><div class="fp-tags">${s.supplies.split(/ \/ /).map(t=>`<span class="fp-tag">${t.trim()}</span>`).join('')}</div></div>`:''}
      ${s.meds?`<div class="fp-section"><div class="fp-label c-red">藥物</div><div class="fp-content" style="color:var(--red);font-weight:700;">${s.meds}</div></div>`:''}
      ${s.implantNotes?`<div class="fp-section"><div class="fp-label c-amber">備註</div><div class="fp-content">${s.implantNotes}</div></div>`:''}
      ${s.doctorHabits?`<div class="fp-section"><div class="fp-label c-teal">醫生習慣</div><div class="fp-content">${hlDr(spaceDoctors(s.doctorHabits))}</div></div>`:''}
      ${s.notes?`<div class="fp-section"><div class="fp-label c-accent">注意事項</div><div class="fp-content">${s.notes}</div></div>`:''}
    `;
  document.getElementById('fpBody').innerHTML=body;
}

// PHOTO HANDLING


function compressImage(file, maxW){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > maxW){ h = h * maxW / w; w = maxW; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.6));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function saveRecord(){
  const p=document.getElementById('f_procedure').value.trim();
  const a=document.getElementById('f_anesthesia').value.trim();
  if(!p||!a){ showToast('⚠️ 術式名稱和麻醉方式為必填'); return; }
  const today=new Date().toLocaleDateString('zh-TW');
  if(editingId){
    const idx=DATA.findIndex(d=>d.id===editingId);
    DATA[idx].pending={
      procedure:p, anesthesia:a,
      position:document.getElementById('f_position').value.trim(),
      disinfect:document.getElementById('f_disinfect').value.trim(),
      tools:document.getElementById('f_tools').value.trim(),
      supplies:document.getElementById('f_supplies').value.trim(),
      meds:document.getElementById('f_meds').value.trim(),
      implantNotes:document.getElementById('f_implantNotes').value.trim(),
      doctorHabits:document.getElementById('f_doctorHabits').value.trim(),
      notes:document.getElementById('f_notes').value.trim(),
      
      editor:currentUser, editorDate:today
    };
  }else{
    const newId=Math.max(0,...DATA.map(d=>d.id))+1;
    DATA.push({
      id:newId, dept:document.getElementById('f_dept').value,
      procedure:p, anesthesia:a,
      position:document.getElementById('f_position').value.trim(),
      disinfect:document.getElementById('f_disinfect').value.trim(),
      tools:document.getElementById('f_tools').value.trim(),
      supplies:document.getElementById('f_supplies').value.trim(),
      meds:document.getElementById('f_meds').value.trim(),
      implantNotes:document.getElementById('f_implantNotes').value.trim(),
      doctorHabits:document.getElementById('f_doctorHabits').value.trim(),
      notes:document.getElementById('f_notes').value.trim(),
      
      status:'待審核', author:currentUser,
      editor:'', editorDate:'', reviewer:'', reviewDate:'', pending:null
    });
  }
  // 先關閉視窗（不卡住），資料已存本機；雲端在背景同步
  closeModal();
  renderAll();
  if(fpId) renderFp();
  saveData();
}

// REVIEW
function openReview(id){
  reviewTargetId=id; selectedReviewer=null;
  const s=DATA.find(d=>d.id===id);
  const list=[...new Set([...(DEPT_REVIEWERS[s.dept]||[]),...ADMINS])];
  document.getElementById('reviewProcName').textContent=`「${s.pending?.procedure||s.procedure}」`;
  document.getElementById('reviewerList').innerHTML=list.map(r=>
    `<button class="reviewer-btn" onclick="selectReviewer('${r}',this)">${r}</button>`
  ).join('');
  document.getElementById('reviewOverlay').classList.add('show');
}
function selectReviewer(name,btn){
  selectedReviewer=name;
  document.querySelectorAll('.reviewer-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}
document.getElementById('reviewCancel').addEventListener('click',()=>{ document.getElementById('reviewOverlay').classList.remove('show'); });
document.getElementById('reviewOk').addEventListener('click',async ()=>{
  if(!selectedReviewer){ showToast('請選擇審核者姓名'); return; }
  const idx=DATA.findIndex(d=>d.id===reviewTargetId);
  if(idx<0) return;
  const today=toROC(new Date());
  const draft=DATA[idx].pending;
  const prevV=DATA[idx].version||1;
  Object.assign(DATA[idx],draft);
  DATA[idx].status='已審核';
  DATA[idx].reviewer=selectedReviewer;
  DATA[idx].reviewDate=today;
  DATA[idx].version=prevV+1;
  DATA[idx].pending=null;
  document.getElementById('reviewOverlay').classList.remove('show');
  await saveData();
  renderAll();
  if(fpId===reviewTargetId) renderFp();
});
document.getElementById('reviewOverlay').addEventListener('click',e=>{ if(e.target===document.getElementById('reviewOverlay')) document.getElementById('reviewOverlay').classList.remove('show'); });

function updateNotif(){
  const myPending=DATA.filter(s=>s.pending && s.pending.editor && canReview(currentUser,s.dept));
  const banner=document.getElementById('notifBanner');
  if(myPending.length>0){
    banner.classList.remove('hidden');
    document.getElementById('notifTitle').textContent=`🔴 你有 ${myPending.length} 筆術式待審核`;
    document.getElementById('notifSub').textContent=[...new Set(myPending.map(s=>s.dept))].join('、')+' → 點此查看';
  }else{ banner.classList.add('hidden'); }
}

}
