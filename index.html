  {"id": 1, "dept": "骨科", "procedure": "Acromioplasty & Rotator Cuff Repair", "anesthesia": "ETGA", "position": "半坐臥", "disinfect": "Alc-BI(謝、戴、吳) / 2%CHG(許、王、賴、林)", "tools": "骨科大基本包(POR01) / Mini Bur(OMB-1) / 電鑽(OCDRZ3) / Mini Saw(OCMSZ-1) / Osteotome(OSTM-4) / K-Pin(OKP-1) / Bone file(KOR12) / Right Angle中(C0008M) / 小Rongeur(GOR01A)", "supplies": "10號刀片 / 20號刀片 / 4吋襪套+紗繃 / OP site 28×30 / 但丁 / Suction tube / 清潔片 / 三角巾 / 記號筆 / Bone Wax / 電燒及導電片 / Ti-Cron 5號、2號 / 紗球", "meds": "", "implantNotes": "1.手術可用錨釘或不用，術前先與醫師確認 2.錨釘有分健保與自費，需廠商事先送來 3.術前確認是否有送器械及廠商跟刀", "doctorHabits": "Dr.戴：消毒Alc-BI，術後A.T.K消毒，OP site 30×28，縫線1/0+2/0+4/0 Polysorb角針+美容膠+白紗+3M+三角巾 / Dr.吳：消毒Alc-BI，縫線1/0+2/0 Vicryl+4/0 Polysorb / Dr.許：消毒2%CHG，縫線1/0+2/0 Vicryl+4/0 Nylon+Tetra藥膏", "notes": "1.病人半坐臥，Myostand要先鋪起來 2.多上1包中單 3.Saw、Burr、Drill by order再上", "status": "已審核", "author": "原編著", "editor": "", "editorDate": "", "reviewer": "", "reviewDate": "", "pending": null},
  // 💡 請在此處維持貼上你原本 id 2 到 id 52 的所有手術資料 💡
  {"id": 53, "dept": "骨科", "procedure": "Unilateral Biportal Endoscopy", "anesthesia": "ETGA", "position": "俯臥(胸:長條脂肪墊×2 / 小腿:枕頭×1 / 膝蓋:甜甜圈×2)", "disinfect": "Alc-BI", "tools": "雙通道脊椎內視鏡系統(UBE-1) / 骨科後開手術包(POR07) / 骨科脊椎手術包(POR06) / 婦科剖腹包", "supplies": "11號刀片 / 20號刀片 / 10號刀片 / C-arm套 / 4吋紗繃 / 3cc空針 / 10cc空針 / Foley+尿袋 / 記號筆 / S/tube×2 / OP site 28×30 / OP site 45×55 / 2000cc N/S / 關節鏡輸液Set / Adrenalin(Amp) / Bone Wax(p.r.n)", "meds": "Adrenalin", "implantNotes": "1.電燒(水電燒/氣化儀)兩種廠牌：庭宇(黑色主機在6房懸臂架) / Depuy(移動式主機在12房對面庫房) 2.自費止血劑長Troca(Folease $15,000 / SurgiFlo $19,800)", "doctorHabits": "Dr.姜：輸液Set長管+7房水接頭+S掛鉤、不用Pump、需高腳蹬 / Dr.許：黑色趴架在骨科庫房 / Table上Myostand架床上 / 貼導電片、可能Open / C-arm和影像系統放痛麻對側、水電燒和影像系統放不同邊", "notes": "1.需C-arm，全程穿鉛衣 2.先跟3R借Myostand 3.醫生站患側，對側C-arm Monitor→主機→影像系統 4.Bipolar與Burr主機與影像系統放不同側 5.泡UBE鏡子0度和30度及光源線，鏡頭送CSR高壓消毒", "status": "已審核", "author": "原編著", "editor": "", "editorDate": "", "reviewer": "", "reviewDate": "", "pending": null}
];

// ==================== 2. 全域狀態與資料初始化 ====================
let DATA = loadData();
let currentUser = null;
let currentDept = '全部科別', currentAne = 'all', currentSearch = '';
let fpId = null, fpMode = 'full';
let editingId = null, reviewTargetId = null, selectedReviewer = null;

function loadData(){
  try{
    const s = localStorage.getItem(STORAGE_KEY);
    if(s) return JSON.parse(s);
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

async function saveData(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA)); }catch(e){}
  try {
    await syncToCloud(DATA);
    showToast('☁️ 已同步到雲端，其他人可看到');
  } catch(e) {
    showToast('⚠️ 雲端同步失敗：' + e.message);
  }
}

async function syncToCloud(data) {
  const res = await fetch(`${FIREBASE_URL}/data.json`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  if(!res.ok) throw new Error('Sync failed: ' + res.status);
  return true;
}

async function loadFromCloud() {
  try {
    const res = await fetch(`${FIREBASE_URL}/data.json`);
    if(!res.ok) return null;
    const json = await res.json();
    return json || null;
  } catch(e) { return null; }
}

// ==================== 3. 權限與登入 ====================
function isReviewer(name){ return ADMINS.includes(name) || Object.values(DEPT_REVIEWERS).some(a=>a.includes(name)); }
function canReview(name,dept){ return ADMINS.includes(name)||(DEPT_REVIEWERS[dept]||[]).includes(name); }
function getUserLabel(name){
  if(ADMINS.includes(name)) return '全科管理員';
  const depts=Object.entries(DEPT_REVIEWERS).filter(([d,a])=>a.includes(name)).map(([d])=>d);
  if(depts.length) return depts.join('、')+' 審核者';
  return '編輯者';
}

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('loginName').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('logoutBtn').addEventListener('click', doLogout);

async function doLogin(){
  const name = document.getElementById('loginName').value.trim();
  if(!name){ showToast('請輸入姓名'); return; }
  currentUser = name;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainApp').style.display = 'block';
  document.getElementById('userNameDisplay').textContent = name;
  document.getElementById('userRoleDisplay').textContent = '｜' + getUserLabel(name);
  
  showToast('⏳ 載入最新雲端資料...');
  try {
    const cloudData = await loadFromCloud();
    if(cloudData && cloudData.length > 0){
      DATA = cloudData;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
      showToast('✅ 資料已與雲端同步（' + DATA.length + ' 筆）');
    }
  } catch(e) {
    showToast('⚠️ 雲端連線失敗，使用本地備份');
  }
  renderAll();
}

function doLogout(){
  currentUser = null;
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginName').value = '';
}

// ==================== 4. 篩選與主要畫面渲染 ====================
function getFiltered(){
  return DATA.filter(s=>{
    const dOk = currentDept==='全部科別'||s.dept===currentDept;
    const u = s.anesthesia.toUpperCase();
    const aOk = currentAne==='all'
      ||(currentAne==='etga'&&(u.includes('ETGA')||u.includes('SPINAL')||u.includes('SA')||u.includes('MASK')))
      ||(currentAne==='la'&&(u.includes('L.A')||u.includes('IVG')||u.includes('LOCAL')));
    if(!dOk||!aOk) return false;
    if(!currentSearch) return true;
    const q = currentSearch.toLowerCase();
    return [s.procedure,s.anesthesia,s.position,s.dept,s.tools||'',s.supplies||'',s.notes||'',s.doctorHabits||''].some(v=>v.toLowerCase().includes(q));
  });
}

function renderAll(){ renderDepts(); renderFilters(); renderCards(); updateNotif(); }

function renderDepts(){
  const existing = new Set(DATA.map(d=>d.dept));
  document.getElementById('deptWrap').innerHTML = ALL_DEPTS
    .filter(d=>d==='全部科別'||existing.has(d))
    .map(d=>{
      const color = DEPT_COLORS[d]||'#5b8fa8';
      const isActive = currentDept===d;
      const style = d==='全部科別'
        ? (isActive?'background:var(--teal);border-color:var(--teal);color:#fff;':'')
        : (isActive?`background:${color};border-color:${color};color:#fff;box-shadow:0 2px 8px ${color}40;`:`border-color:${color}60;color:${color};`);
      return `<button class="dept-btn" style="${style}" onclick="setDept('${d}')">${d}</button>`;
    }).join('');
}
function setDept(d){ currentDept=d; renderDepts(); renderCards(); }

function renderFilters(){
  document.getElementById('filterWrap').innerHTML = [
    {k:'all',l:'全部麻醉'},{k:'etga',l:'ETGA 全身麻醉'},{k:'la',l:'L.A / IVGS 局部'}
  ].map(f=>`<button class="filter-btn ${currentAne===f.k?'active':''}" onclick="setAne('${f.k}')">${f.l}</button>`).join('');
}
function setAne(k){ currentAne=k; renderFilters(); renderCards(); }

['nav-all','nav-etga','nav-la'].forEach((id,i)=>{
  document.getElementById(id).addEventListener('click',()=>{
    document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    setAne(['all','etga','la'][i]);
  });
});

document.getElementById('searchInput').addEventListener('input', e=>{
  currentSearch = e.target.value;
  renderCards();
});

function aneBadge(a){
  const u=a.toUpperCase();
  if(u.includes('ETGA')) return `<span class="badge badge-blue">ETGA</span>`;
  if(u.includes('L.A')||u.includes('IVG')) return `<span class="badge badge-green">L.A/IVG</span>`;
  return `<span class="badge badge-amber">${a.split(' ')[0]}</span>`;
}
function statusBadge(s){
  return s==='已審核'?'<span class="badge badge-approved">✓ 已審核</span>':'<span class="badge badge-pending">⏳ 待審核</span>';
}
function deptBadge(d){
  const c=DEPT_COLORS[d]||'#5b8fa8';
  return `<span class="badge" style="background:${c}18;color:${c};border-color:${c}40;font-size:11px;">${d}</span>`;
}

function renderCards(){
  const f = getFiltered();
  const deptCount = currentDept==='全部科別'?DATA.length:DATA.filter(d=>d.dept===currentDept).length;
  const pendingCount = DATA.filter(d=>d.pending).length;
  let stats = `<div class="stat-pill">顯示 <strong>${f.length}</strong> 筆</div><div class="stat-pill">本科 <strong>${deptCount}</strong> 筆</div><div class="stat-pill">總計 <strong>${DATA.length}</strong> 筆</div>`;
  if(pendingCount>0) stats += `<div class="stat-pill" style="border-color:var(--red);color:var(--red);">🔴 待審 <strong>${pendingCount}</strong></div>`;
  document.getElementById('statsBar').innerHTML = stats;
  const w = document.getElementById('cardsWrap');
  if(!f.length){ w.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">找不到符合的術式</div></div>'; return; }
  w.innerHTML = f.map((s,i)=>{
    const color = DEPT_COLORS[s.dept]||'#5b8fa8';
    return `<div class="card" id="card-${s.id}" style="animation-delay:${i*.02}s;border-left-color:${color};" onclick="openFp(${s.id})">
      <div class="card-header">
        <div class="card-title">${s.procedure}</div>
        <div class="card-chevron">›</div>
      </div>
      <div class="card-meta">
        ${deptBadge(s.dept)}${aneBadge(s.anesthesia)}
        <span class="badge badge-pos">📐 ${s.position}</span>
        ${statusBadge(s.status)}
        ${s.pending?'<span class="badge" style="background:var(--red-dim);color:var(--red);border-color:var(--red);font-size:11px;">📝 待審版本</span>':''}
      </div>
    </div>`;
  }).join('');
}

// ==================== 5. 詳細檢視頁面 (包含即時照片上傳) ====================
function openFp(id){
  fpId=id; fpMode='full';
  document.getElementById('fullpage').style.cssText='display:block;';
  document.getElementById('fullpage').scrollTop=0;
  renderFp();
}
document.getElementById('fpBack').addEventListener('click',()=>{
  document.getElementById('fullpage').style.display='none';
  fpId=null;
});
document.getElementById('fpEdit').addEventListener('click',()=>{ if(fpId) openModal(fpId); });

function renderFp(){
  const s=DATA.find(d=>d.id===fpId); if(!s) return;
  const color=DEPT_COLORS[s.dept]||'#5b8fa8';
  document.getElementById('fpDept').textContent=s.dept;
  document.getElementById('fpDept').style.color=color;
  document.getElementById('fpTitle').textContent=s.procedure;
  let body='';
  body+=`<div class="fp-meta">${deptBadge(s.dept)}${aneBadge(s.anesthesia)}<span class="badge badge-pos">📐 ${s.position}</span>${statusBadge(s.status)}</div>`;
  body+=`<div class="fp-quick">
    <button class="fp-qbtn ${fpMode==='full'?'active':''}" onclick="setFpMode('full')">📋 完整備料</button>
    <button class="fp-qbtn ${fpMode==='quick'?'active':''}" onclick="setFpMode('quick')">⚡ 術中快查</button>
  </div>`;

  rec.push(`<span>📝 原編著：<strong>${s.author||'—'}</strong></span>`);
  if(s.editor) rec.push(`<span>✏️ 修改者：<strong>${s.editor}</strong>${s.editorDate?' ('+s.editorDate+')':''}</span>`);
  if(s.reviewer) rec.push(`<span>✅ 審核者：<strong>${s.reviewer}</strong>${s.reviewDate?' ('+s.reviewDate+')':''}</span>`);
  body+=`<div class="fp-record">${rec.join('')}</div>`;
  
  if(s.pending){
    const canRev=canReview(currentUser,s.dept);
    let diffs='';
    const fields=[['術式名稱',s.procedure,s.pending.procedure],['麻醉方式',s.anesthesia,s.pending.anesthesia],
      ['手術姿勢',s.position,s.pending.position],['消毒方式',s.disinfect,s.pending.disinfect],
      ['工具器械',s.tools,s.pending.tools],['耗材',s.supplies,s.pending.supplies],
      ['藥物',s.meds,s.pending.meds],['骨材備註',s.implantNotes,s.pending.implantNotes],
      ['醫生習慣',s.doctorHabits,s.pending.doctorHabits],['注意事項',s.notes,s.pending.notes]];
    fields.forEach(([label,old,nw])=>{
      if((old||'')!==(nw||''))
        diffs+=`<div class="diff-row"><div class="diff-label">${label}</div><div class="diff-old">${old||'（空白）'}</div><div class="diff-new">${nw||'（空白）'}</div></div>`;
    });
    body+=`<div class="pending-notice">
      <div class="pending-title">⏳ 待審核的修改內容</div>
      <div class="pending-sub">✏️ 修改者：<strong>${s.pending.editor}</strong>（${s.pending.editorDate}）</div>
      ${diffs||'<div style="font-size:13px;color:var(--text3)">（無欄位變更）</div>'}
      ${canRev?`<button class="btn-review" onclick="openReview(${s.id})">✅ 審核通過，正式公佈</button>`:'<div style="font-size:12px;color:var(--text3);margin-top:8px;">（需等待本科審核者審核）</div>'}
    </div>`;
  }
  
  if(fpMode==='quick'){
    body+=`
      <div class="fp-section"><div class="fp-label c-amber">麻醉 ／ 姿勢</div><div class="fp-content">${s.anesthesia} ｜ ${s.position}</div></div>
      <div class="fp-section"><div class="fp-label c-teal">消毒方式</div><div class="fp-content">${s.disinfect||'—'}</div></div>
      ${s.meds?`<div class="fp-section"><div class="fp-label c-red">藥物</div><div class="fp-content" style="color:var(--red);font-weight:700;">${s.meds}</div></div>`:''}
    `;
  }else{
    body+=`
      <div class="fp-section"><div class="fp-label c-amber">姿勢</div><div class="fp-content">${s.position||'—'}</div></div>
      <div class="fp-section"><div class="fp-label c-teal">消毒方式</div><div class="fp-content">${s.disinfect||'—'}</div></div>
      ${s.tools?`<div class="fp-section"><div class="fp-label c-accent">工具 ／ 器械</div><div class="fp-tags">${s.tools.split('/').map(t=>`<span class="fp-tag">${t.trim()}</span>`).join('')}</div></div>`:''}
      ${s.supplies?`<div class="fp-section"><div class="fp-label c-green">耗材</div><div class="fp-tags">${s.supplies.split('/').map(t=>`<span class="fp-tag">${t.trim()}</span>`).join('')}</div></div>`:''}
      ${s.meds?`<div class="fp-section"><div class="fp-label c-red">藥物</div><div class="fp-content" style="color:var(--red);font-weight:700;">${s.meds}</div></div>`:''}
      ${s.implantNotes?`<div class="fp-section"><div class="fp-label c-amber">骨材備註</div><div class="fp-content">${s.implantNotes}</div></div>`:''}
      ${s.doctorHabits?`<div class="fp-section"><div class="fp-label c-teal">醫生習慣</div><div class="fp-content">${s.doctorHabits}</div></div>`:''}
      ${s.notes?`<div class="fp-section"><div class="fp-label c-accent">注意事項</div><div class="fp-content">${s.notes}</div></div>`:''}
      
      <div class="fp-section">
        <div class="fp-label c-accent">器械照片</div>
        <div class="fp-photos" id="fpToolPhotoArea">
          ${(s.toolPhotos&&s.toolPhotos.length)?s.toolPhotos.map(p=>`<div class="fp-photo" onclick="viewPhoto('${p}')"><img src="${p}"></div>`).join(''):'<div style="font-size:13px;color:var(--text3);padding:4px 0;">尚未上傳器械照片</div>'}
        </div>
      </div>
      <div class="fp-section">
        <div class="fp-label c-amber">擺位照片</div>
        <div class="fp-photos" id="fpPosPhotoArea">
          ${(s.posPhotos&&s.posPhotos.length)?s.posPhotos.map(p=>`<div class="fp-photo" onclick="viewPhoto('${p}')"><img src="${p}"></div>`).join(''):'<div style="font-size:13px;color:var(--text3);padding:4px 0;">尚未上傳擺位照片</div>'}
        </div>
      </div>

      <div class="fp-section" style="margin-top:24px; padding:12
