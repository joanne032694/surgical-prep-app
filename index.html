<style>
:root{
  --bg:#f3f1ea; --surface:#ffffff; --ink:#23211c; --ink2:#6f675b; --ink3:#a59c8c;

  --sans:"Noto Sans TC",system-ui,sans-serif; --r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;
  padding:max(28px,env(safe-area-inset-top)) 16px 40px;}
.wrap{width:100%;max-width:440px;margin:0 auto;}
.masthead{text-align:center;padding:14px 0 22px;position:relative;}
.crest{width:54px;height:54px;border-radius:15px;background:var(--teal);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:27px;margin:0 auto 14px;
  box-shadow:0 6px 18px rgba(31,107,92,.28);}
.h-title{font-size:28px;font-weight:900;letter-spacing:.04em;line-height:1.3;}
.h-rule{width:34px;height:3px;background:var(--teal);border-radius:2px;margin:12px auto 10px;}
.h-sub{font-size:15px;color:var(--ink3);letter-spacing:.18em;text-transform:uppercase;font-weight:500;}
.h-hint{font-size:16px;color:var(--ink2);margin-top:14px;}
.list{display:flex;flex-direction:column;gap:9px;margin-top:6px;}
.card{display:flex;align-items:center;gap:14px;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--r);padding:13px 15px;
  text-decoration:none;color:var(--ink);
  transition:transform .14s ease,box-shadow .14s ease,border-color .14s ease;
  box-shadow:0 1px 1px rgba(35,33,28,.03);
  animation:rise .4s ease both;animation-delay:calc(var(--i)*.035s);}
@keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.card:hover{box-shadow:0 8px 22px rgba(35,33,28,.10);border-color:var(--line2);transform:translateY(-1px);}
.card:active{transform:scale(.99);}
.mark{flex-shrink:0;width:42px;height:42px;border-radius:11px;
  font-size:20px;font-weight:900;display:flex;align-items:center;justify-content:center;}
.meta{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px;}
.name{font-size:25px;font-weight:900;letter-spacing:.02em;line-height:1.3;}
.en{font-size:11px;color:var(--ink3);letter-spacing:.12em;text-transform:uppercase;font-weight:500;}
.arr{width:18px;height:18px;color:var(--line2);flex-shrink:0;transition:transform .14s,color .14s;}
.card:hover .arr{color:var(--ink2);transform:translateX(2px);}
.foot{text-align:center;font-size:12px;color:var(--ink3);margin-top:24px;line-height:1.7;letter-spacing:.02em;}
@media (prefers-reduced-motion:reduce){.card{animation:none;}}
.signature{position:fixed;right:18px;bottom:14px;text-align:right;pointer-events:none;z-index:5;}
.signature .by{font-family:'Great Vibes',cursive;font-size:26px;line-height:1;color:#1a1a1a;opacity:.8;}
.signature .role{font-size:11px;color:#444;letter-spacing:.25em;margin-top:2px;opacity:.8;}
</style>
</head>
