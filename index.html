<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="手術用物手冊">
<title>手術室手術用物準備手冊</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf8f3;--bg2:#f5f2eb;--surface:#fff;--surface2:#fdf9f2;
  --border:#e8e2d6;--border2:#d4cbbe;
  --accent:#5b8fa8;--accent2:#4a7a94;--accent-dim:rgba(91,143,168,0.1);
  --green:#4a9e7a;--green-dim:rgba(74,158,122,0.1);
  --amber:#c8813a;--amber-dim:rgba(200,129,58,0.12);
  --red:#c0464a;--red-dim:rgba(192,70,74,0.1);
  --teal:#3a9090;--teal-dim:rgba(58,144,144,0.1);
  --text:#2c2620;--text2:#6b5f54;--text3:#a8998c;
  --sans:"Noto Sans TC",sans-serif;--r:12px;--rs:8px;
  --shadow:0 1px 4px rgba(0,0,0,0.06),0 2px 12px rgba(0,0,0,0.04);
  --shadow2:0 2px 8px rgba(0,0,0,0.08),0 4px 20px rgba(0,0,0,0.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:90px;}

/* LOGIN */
.login-screen{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 28px;max-width:480px;margin:0 auto;}
.login-screen.hidden{display:none;}
.login-logo{font-size:64px;margin-bottom:16px;}
.login-title{font-size:24px;font-weight:700;color:var(--text);margin-bottom:8px;text-align:center;}
.login-sub{font-size:15px;color:var(--text3);margin-bottom:40px;text-align:center;line-height:1.6;}
.ms-login-btn{width:100%;max-width:320px;background:#0078d4;border:none;border-radius:var(--rs);color:#fff;font-family:var(--sans);font-size:17px;font-weight:700;padding:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;box-shadow:0 4px 16px rgba(0,120,212,0.3);transition:all .2s;}
.ms-login-btn:hover{background:#106ebe;}
.ms-login-btn:active{transform:scale(.98);}
.ms-icon{width:24px;height:24px;flex-shrink:0;}
.login-note{font-size:13px;color:var(--text3);margin-top:20px;text-align:center;line-height:1.6;}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--bg);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loading-screen.hidden{display:none;}
.spinner{width:48px;height:48px;border:4px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:16px;color:var(--text3);}

/* USER BAR */
.user-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;}
.user-name{font-size:14px;font-weight:700;color:var(--accent2);}
.user-role{font-size:12px;color:var(--text3);margin-left:6px;}
.logout-btn{font-size:13px;color:var(--text3);background:none;border:1px solid var(--border2);border-radius:999px;padding:4px 12px;cursor:pointer;}

/* NOTIFICATION */
.notif-banner{background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;}
.notif-banner.hidden{display:none;}
.notif-left{display:flex;align-items:center;gap:10px;}
.notif-icon{font-size:22px;}
.notif-title{font-size:16px;font-weight:700;}
.notif-sub{font-size:12px;opacity:.9;margin-top:1px;}
.notif-arrow{font-size:22px;}

/* HEADER */
.header{background:rgba(250,248,243,0.97);border-bottom:1px solid var(--border);padding:14px 16px 12px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);}
.header-top{display:flex;align-items:center;gap:11px;margin-bottom:11px;}
.logo{width:42px;height:42px;background:linear-gradient(135deg,#e8f0f5,#d4e6f0);border:1px solid var(--border2);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:var(--shadow);}
.header-info{flex:1;}
.header-title{font-size:18px;font-weight:700;color:var(--text);}
.header-sub{font-size:12px;color:var(--text3);margin-top:1px;}
.btn-add{background:var(--accent);border:none;border-radius:var(--rs);color:#fff;font-family:var(--sans);font-size:15px;font-weight:700;padding:9px 16px;cursor:pointer;display:flex;align-items:center;gap:5px;box-shadow:0 2px 8px rgba(91,143,168,0.3);white-space:nowrap;}
.search-wrap{position:relative;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
.search-input{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:var(--sans);font-size:16px;padding:11px 12px 11px 40px;outline:none;transition:all .2s;}
.search-input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-dim);}
.search-input::placeholder{color:var(--text3);}

/* DEPT FILTER */
.dept-wrap{padding:10px 14px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;background:var(--surface2);border-bottom:1px solid var(--border);}
.dept-wrap::-webkit-scrollbar{display:none;}
.dept-btn{flex-shrink:0;padding:7px 16px;border-radius:999px;border:1.5px solid var(--border2);background:transparent;color:var(--text3);font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}

/* ANE FILTER */
.filter-wrap{padding:8px 14px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;background:var(--surface2);border-bottom:1px solid var(--border);}
.filter-wrap::-webkit-scrollbar{display:none;}
.filter-btn{flex-shrink:0;padding:6px 14px;border-radius:999px;border:1.5px solid var(--border);background:transparent;color:var(--text3);font-family:var(--sans);font-size:14px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.filter-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent2);font-weight:600;}

/* STATS */
.stats-bar{padding:9px 16px;display:flex;gap:8px;flex-wrap:wrap;background:var(--bg2);border-bottom:1px solid var(--border);}
.stat-pill{font-size:13px;color:var(--text3);padding:4px 11px;background:var(--surface);border:1px solid var(--border);border-radius:999px;}
.stat-pill strong{color:var(--accent2);font-weight:700;}

/* CARDS */
.cards-wrap{padding:14px 14px;display:flex;flex-direction:column;gap:12px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--surface);border:2px solid var(--border2);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);animation:fadeUp .25s ease both;cursor:pointer;transition:all .15s;}
.card:active{transform:scale(.99);}
.card-header{padding:15px 16px 11px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.card-title{font-size:18px;font-weight:700;line-height:1.4;color:var(--text);flex:1;}
.card-edit-btn{width:30px;height:30px;border-radius:7px;border:1.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);flex-shrink:0;transition:all .15s;}
.card-edit-btn:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-dim);}
.card-meta{padding:0 16px 13px;display:flex;flex-wrap:wrap;gap:6px;}
.badge{font-size:13px;padding:3px 10px;border-radius:5px;font-weight:600;border:1px solid transparent;}
.badge-blue{background:rgba(91,143,168,0.12);color:var(--accent2);border-color:rgba(91,143,168,0.2);}
.badge-green{background:var(--green-dim);color:var(--green);border-color:rgba(74,158,122,0.2);}
.badge-amber{background:var(--amber-dim);color:var(--amber);border-color:rgba(200,129,58,0.2);}
.badge-pos{background:rgba(168,153,140,0.1);color:var(--text2);border-color:var(--border);}
.badge-pending{background:var(--amber-dim);color:var(--amber);border-color:rgba(200,129,58,0.3);font-size:12px;}
.badge-approved{background:var(--green-dim);color:var(--green);border-color:rgba(74,158,122,0.3);font-size:12px;}
.badge-draft{background:var(--red-dim);color:var(--red);border-color:rgba(192,70,74,0.3);font-size:12px;}

/* FULLPAGE */
.fullpage{position:fixed;inset:0;width:100vw;height:100vh;background:var(--bg);z-index:200;overflow-y:auto;padding-bottom:90px;display:none;}
.fullpage.show{display:block;}
.fp-header{background:rgba(250,248,243,0.97);border-bottom:2px solid var(--border2);padding:14px 16px;position:sticky;top:0;z-index:10;backdrop-filter:blur(20px);display:flex;align-items:center;gap:12px;}
.fp-back{width:40px;height:40px;border-radius:10px;border:1.5px solid var(--border2);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--text2);flex-shrink:0;}
.fp-header-info{flex:1;min-width:0;}
.fp-dept{font-size:13px;color:var(--text3);margin-bottom:2px;}
.fp-title{font-size:18px;font-weight:700;color:var(--text);line-height:1.3;}
.fp-edit{width:40px;height:40px;border-radius:10px;border:1.5px solid var(--border2);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);flex-shrink:0;}
.fp-body{padding:16px;max-width:480px;margin:0 auto;}
.fp-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.fp-quick{display:flex;gap:8px;margin-bottom:16px;}
.fp-qbtn{flex:1;padding:11px;border-radius:var(--rs);border:1.5px solid var(--border2);background:var(--surface);color:var(--text3);font-family:var(--sans);font-size:15px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s;}
.fp-qbtn.active{border-color:var(--accent);color:var(--accent2);background:var(--accent-dim);font-weight:700;}
.fp-record{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:5px 14px;}
.fp-record span{font-size:13px;color:var(--text3);}
.fp-record strong{color:var(--text2);font-weight:600;}
.fp-section{margin-bottom:14px;}
.fp-label{font-size:14px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:var(--text3);margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.fp-label::before{content:"";width:4px;height:14px;border-radius:2px;background:currentColor;opacity:0.6;flex-shrink:0;}
.c-accent{color:var(--accent2)}.c-green{color:var(--green)}.c-amber{color:var(--amber)}.c-teal{color:var(--teal)}.c-red{color:var(--red)}
.fp-content{font-size:16px;color:var(--text2);line-height:1.85;background:var(--surface);border-radius:var(--rs);padding:12px 14px;border:1.5px solid var(--border);}
.fp-tags{display:flex;flex-wrap:wrap;gap:6px;}
.fp-tag{font-size:14px;padding:6px 13px;border-radius:var(--rs);background:var(--surface);border:1.5px solid var(--border2);color:var(--text2);}

/* PENDING NOTICE */
.pending-notice{background:linear-gradient(135deg,rgba(200,129,58,0.1),rgba(200,129,58,0.05));border:1.5px solid rgba(200,129,58,0.3);border-radius:var(--rs);padding:12px 14px;margin-bottom:14px;}
.pending-notice-title{font-size:14px;font-weight:700;color:var(--amber);margin-bottom:5px;}
.pending-notice-sub{font-size:13px;color:var(--text2);line-height:1.6;}
.btn-review-now{background:var(--green);border:none;border-radius:7px;color:#fff;font-family:var(--sans);font-size:14px;font-weight:700;padding:8px 16px;cursor:pointer;margin-top:10px;display:inline-block;}

/* DIFF */
.diff-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;margin-bottom:8px;}
.diff-label{font-size:12px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
.diff-old{font-size:13px;color:var(--text3);padding:5px 8px;background:rgba(168,153,140,0.08);border-radius:4px;text-decoration:line-through;opacity:0.7;margin-bottom:4px;}
.diff-new{font-size:14px;color:var(--red);padding:5px 8px;background:rgba(192,70,74,0.06);border-radius:4px;border-left:3px solid var(--red);font-weight:600;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,38,32,0.55);z-index:300;overflow-y:auto;padding:20px 14px;backdrop-filter:blur(6px);}
.modal-overlay.show{display:flex;align-items:flex-start;justify-content:center;}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;width:100%;max-width:448px;padding:20px;box-shadow:0 8px 40px rgba(0,0,0,0.15);}
.modal-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.modal-notice{font-size:13px;color:var(--amber);background:var(--amber-dim);border-radius:6px;padding:8px 11px;margin-bottom:14px;line-height:1.5;}
.modal-close{width:30px;height:30px;border-radius:50%;background:var(--bg2);border:1px solid var(--border2);cursor:pointer;color:var(--text3);font-size:15px;display:flex;align-items:center;justify-content:center;}
.form-group{margin-bottom:12px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.form-label{font-size:13px;font-weight:700;color:var(--text3);letter-spacing:0.04em;text-transform:uppercase;margin-bottom:5px;display:block;}
.form-input,.form-textarea,.form-select{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:var(--sans);font-size:15px;padding:10px 12px;outline:none;transition:all .2s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-dim);}
.form-textarea{resize:vertical;min-height:70px;line-height:1.6;}
.form-select option{background:#fff;}
.form-hint{font-size:12px;color:var(--text3);margin-top:3px;}
.modal-actions{display:flex;gap:9px;margin-top:18px;}
.btn-cancel{flex:1;padding:12px;border-radius:var(--rs);border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--sans);font-size:15px;cursor:pointer;}
.btn-save{flex:2;padding:12px;border-radius:var(--rs);border:none;background:var(--accent);color:#fff;font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(91,143,168,0.3);}

/* REVIEW MODAL */
.review-modal{background:var(--surface);border:1.5px solid rgba(74,158,122,0.3);border-radius:14px;width:100%;max-width:380px;padding:24px;box-shadow:0 8px 40px rgba(0,0,0,0.15);}
.review-modal-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px;text-align:center;}
.review-modal-proc{font-size:15px;color:var(--text2);margin-bottom:6px;text-align:center;font-weight:600;}
.review-modal-sub{font-size:13px;color:var(--text3);margin-bottom:16px;text-align:center;line-height:1.5;}
.reviewer-list{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.reviewer-btn{padding:13px 16px;border-radius:var(--rs);border:1.5px solid var(--border2);background:var(--bg2);color:var(--text);font-family:var(--sans);font-size:16px;font-weight:500;cursor:pointer;transition:all .15s;text-align:left;}
.reviewer-btn.selected{border-color:var(--green);background:var(--green-dim);color:var(--green);font-weight:700;}
.review-actions{display:flex;gap:8px;}
.btn-review-cancel{flex:1;padding:12px;border-radius:var(--rs);border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--sans);font-size:14px;cursor:pointer;}
.btn-review-ok{flex:2;padding:12px;border-radius:var(--rs);border:none;background:var(--green);color:#fff;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;}

/* PENDING LIST MODAL */
.pending-modal{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;width:100%;max-width:448px;padding:20px;box-shadow:0 8px 40px rgba(0,0,0,0.15);max-height:85vh;overflow-y:auto;}
.pending-modal-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
.pending-modal-sub{font-size:13px;color:var(--text3);margin-bottom:16px;}
.pending-item{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.pending-item-proc{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px;}
.pending-item-meta{font-size:13px;color:var(--text3);display:flex;flex-wrap:wrap;gap:5px 14px;}
.pending-item-meta strong{color:var(--text2);}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(250,248,243,0.97);border-top:1px solid var(--border);display:flex;padding:10px 0 18px;z-index:100;backdrop-filter:blur(20px);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--text3);font-size:12px;font-weight:500;transition:color .15s;}
.nav-item.active{color:var(--accent);}
.nav-item svg{width:22px;height:22px;}

.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-icon{font-size:44px;margin-bottom:12px;opacity:0.4;}
.empty-text{font-size:15px;}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:#fff;font-size:14px;padding:10px 18px;border-radius:999px;z-index:500;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.2);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="loginScreen">
  <div class="login-logo">🏥</div>
  <div class="login-title">手術室手術用物準備手冊</div>
  <div class="login-sub">使用醫院 Microsoft 帳號登入<br>資料即時同步至 SharePoint</div>
  <button class="ms-login-btn" onclick="msLogin()">
    <svg class="ms-icon" viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg">
      <path fill="#f3f3f3" d="M0 0h23v23H0z"/>
      <path fill="#f35325" d="M1 1h10v10H1z"/>
      <path fill="#81bc06" d="M12 1h10v10H12z"/>
      <path fill="#05a6f0" d="M1 12h10v10H1z"/>
      <path fill="#ffba08" d="M12 12h10v10H12z"/>
    </svg>
    使用 Microsoft 帳號登入
  </button>
  <div class="login-note">登入後即可查詢、編輯術式備料<br>修改內容需經各科組長審核後公佈</div>
</div>

<!-- Loading -->
<div class="loading-screen hidden" id="loadingScreen">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">正在載入資料...</div>
</div>

<!-- Main App -->
<div id="mainApp" style="display:none;">
  <div class="user-bar">
    <div>
      <span class="user-name" id="userNameDisplay"></span>
      <span class="user-role" id="userRoleDisplay"></span>
    </div>
    <button class="logout-btn" onclick="doLogout()">登出</button>
  </div>

  <div class="notif-banner hidden" id="notifBanner" onclick="openPendingList()">
    <div class="notif-left">
      <div class="notif-icon">🔔</div>
      <div>
        <div class="notif-title" id="notifTitle">待審核術式</div>
        <div class="notif-sub" id="notifSub">點此查看</div>
      </div>
    </div>
    <div class="notif-arrow">›</div>
  </div>

  <div class="header">
    <div class="header-top">
      <div class="logo">🏥</div>
      <div class="header-info">
        <div class="header-title">手術室手術用物準備手冊</div>
        <div class="header-sub">SharePoint 即時同步</div>
      </div>
      <button class="btn-add" onclick="openModal()">＋ 新增</button>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" type="text" id="searchInput" placeholder="搜尋術式、器械、耗材…" oninput="doFilter()">
    </div>

<script>
// ===== CONFIG =====
const SP_SITE = 'https://eckaz.sharepoint.com/sites/SurgicalPrep2';
const SP_LIST = 'SurgicalPrep';
const CLIENT_ID = '872cd9fa-d31f-45e0-9eab-6e460a02d1f2'; // Microsoft common
const TENANT_ID = 'common';
const REDIRECT_URI = window.location.origin + window.location.pathname;
const SCOPES = 'https://eckaz.sharepoint.com/AllSites.ReadWrite';

// Field mappings
const FIELDS = {
  id: 'ID',
  title: 'Title',
  dept: '_x79d1__x5225_',
  procedure: '_x8853__x5f0f_',
  anesthesia: '_x5de5__x5177__x3001__x5668__x68',
  position: '_x85e5__x7269_',
  disinfect: '_x59ff__x52e2_',
  tools: '_x9ebb__x9189__x65b9__x5f0f_',
  supplies: '_x8017__x6750_',
  implantNotes: '_x6ce8__x610f__x4e8b__x9805_',
  doctorHabits: '_x63d0__x4ea4__x8005_',
  notes: '_x5be9__x6838__x5099__x8a3b_',
  status: '_x72c0__x614b_',
  submitter: '_x63d0__x4ea4__x8005_1'
};

const DEPT_REVIEWERS = {
  "眼科":["王嘉羚","張佩琪","蕭帆妤","王婷婷"],
  "一般外科":["李靜怡","張瑋恩","蕭帆妤","王婷婷"],
  "直腸外科":["李靜怡","張瑋恩","蕭帆妤","王婷婷"],
  "胸腔外科":["李靜怡","張瑋恩","蕭帆妤","王婷婷"],
  "乳房外科":["李靜怡","張瑋恩","蕭帆妤","王婷婷"],
  "小兒外科":["李靜怡","張瑋恩","蕭帆妤","王婷婷"],
  "神經外科":["羅秀如","程郁淳","蕭帆妤","王婷婷"],
  "整形外科":["王玉仙","辜嬿潔","蕭帆妤","王婷婷"],
  "骨科":["卓湘晴","黃淑樺","徐禾沐","蕭帆妤","王婷婷"],
  "泌尿科":["郭妍伶","林靜子","蕭帆妤","王婷婷"],
  "耳鼻喉科":["洪怡婷","蕭帆妤","王婷婷"],
  "心臟外科":["黃怡婷","汪瑄柔","陳玉茹","蕭帆妤","王婷婷"],
  "口腔外科":["林昕澄","謝佩芳","蕭帆妤","王婷婷"],
  "達文西手術":["高靖緹","周芳怡","蕭帆妤","王婷婷"],
  "婦產科":["楊衣甄","蕭帆妤","王婷婷"]
};
const ADMINS = ["王婷婷","蕭帆妤"];

const DEPT_COLORS = {
  "眼科":"#e74c8b","一般外科":"#e86b2a","直腸外科":"#d4572a",
  "胸腔外科":"#3a7bd5","乳房外科":"#c0478a","小兒外科":"#27ae8f",
  "神經外科":"#7c5fd4","整形外科":"#e0903a","骨科":"#2e86c1",
  "泌尿科":"#16a085","耳鼻喉科":"#d4b030","心臟外科":"#c0392b",
  "口腔外科":"#7d6608","達文西手術":"#1abc9c","婦產科":"#e056a0"
};

const ALL_DEPTS = ['全部科別','眼科','一般外科','直腸外科','胸腔外科','乳房外科','小兒外科','神經外科','整形外科','骨科','泌尿科','耳鼻喉科','心臟外科','口腔外科','達文西手術','婦產科'];

// ===== STATE =====
let accessToken = null;
let currentUser = null;
let DATA = [];
let currentDept = '全部科別';
let currentAne = 'all';
let currentSearch = '';
let editingId = null;
let reviewTargetId = null;
let selectedReviewer = null;
let fullpageId = null;
let fullpageMode = 'full';

// ===== AUTH =====
function msLogin() {
  const authUrl = `https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/authorize?` +
    `client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}` +
    `&scope=${encodeURIComponent('User.Read ' + SCOPES)}&response_mode=fragment&prompt=select_account`;
  window.location.href = authUrl;
}

function parseToken() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');
  if (token) {
    accessToken = token;
    window.location.hash = '';
    return true;
  }
  return false;
}

async function getUserInfo() {
  const res = await fetch('https://graph.microsoft.com/v1.0/me', {
    headers: { 'Authorization': `Bearer ${accessToken}` }
  });
  const data = await res.json();
  return data.displayName || data.userPrincipalName || '使用者';
}

function canReviewDept(name, dept) {
  if (ADMINS.includes(name)) return true;
  return (DEPT_REVIEWERS[dept] || []).includes(name);
}

function getUserLabel(name) {
  if (ADMINS.includes(name)) return '｜全科管理員';
  const depts = Object.entries(DEPT_REVIEWERS).filter(([d,a]) => a.includes(name)).map(([d]) => d);
  if (depts.length) return `｜${depts.join('、')} 審核者`;
  return '｜編輯者';
}

// ===== SHAREPOINT API =====
async function spFetch(url, options = {}) {
  const res = await fetch(url, {
    ...options,
    headers: {
      'Authorization': `Bearer ${accessToken}`,
      'Accept': 'application/json;odata=nometadata',
      'Content-Type': 'application/json',
      ...options.headers
    }
  });
  if (!res.ok) throw new Error(`SP Error: ${res.status}`);
  if (res.status === 204) return null;
  return res.json();
}

async function loadData() {
  const fields = Object.values(FIELDS).join(',');
  const url = `${SP_SITE}/_api/lists/getbytitle('${SP_LIST}')/items?$select=${fields}&$top=500&$orderby=ID`;
  const data = await spFetch(url);
  DATA = (data.value || []).map(item => ({
    id: item.ID,
    dept: item[FIELDS.dept] || '骨科',
    procedure: item[FIELDS.procedure] || item.Title || '',
    anesthesia: item[FIELDS.anesthesia] || '',
    position: item[FIELDS.position] || '',
    disinfect: item[FIELDS.disinfect] || '',
    tools: item[FIELDS.tools] || '',
    supplies: item[FIELDS.supplies] || '',
    implantNotes: item[FIELDS.implantNotes] || '',
    doctorHabits: item[FIELDS.doctorHabits] || '',
    notes: item[FIELDS.notes] || '',
    status: item[FIELDS.status] || '待審核',
    author: item.Author?.Title || '',
    editor: item.Editor?.Title || '',
    modified: item.Modified || ''
  }));
}

async function saveToSP(data, id = null) {
  const body = {
    Title: data.procedure,
    [FIELDS.dept]: data.dept,
    [FIELDS.procedure]: data.procedure,
    [FIELDS.anesthesia]: data.anesthesia,
    [FIELDS.position]: data.position,
    [FIELDS.disinfect]: data.disinfect,
    [FIELDS.tools]: data.tools,
    [FIELDS.supplies]: data.supplies,
    [FIELDS.implantNotes]: data.implantNotes,
    [FIELDS.doctorHabits]: data.doctorHabits,
    [FIELDS.notes]: data.notes,
    [FIELDS.status]: data.status
  };

  if (id) {
    await spFetch(`${SP_SITE}/_api/lists/getbytitle('${SP_LIST}')/items(${id})`, {
      method: 'POST',
      headers: { 'X-HTTP-Method': 'MERGE', 'IF-MATCH': '*' },
      body: JSON.stringify(body)
    });
  } else {
    await spFetch(`${SP_SITE}/_api/lists/getbytitle('${SP_LIST}')/items`, {
      method: 'POST',
      body: JSON.stringify(body)
    });
  }
}

function doLogout() {
  accessToken = null;
  currentUser = null;
  DATA = [];
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginScreen').classList.remove('hidden');
}

// ===== FILTER =====
function getFiltered() {
  return DATA.filter(s => {
    const deptOk = currentDept === '全部科別' || s.dept === currentDept;
    const u = s.anesthesia.toUpperCase();
    const aneOk = currentAne === 'all'
      || (currentAne === 'etga' && (u.includes('ETGA') || u.includes('SPINAL') || u.includes('SA') || u.includes('MASK')))
      || (currentAne === 'la' && (u.includes('L.A') || u.includes('IVG') || u.includes('LOCAL')));
    if (!deptOk || !aneOk) return false;
    if (!currentSearch) return true;
    const q = currentSearch.toLowerCase();
    return [s.procedure, s.anesthesia, s.position, s.dept, s.tools, s.supplies, s.notes, s.doctorHabits, s.implantNotes].some(v => (v || '').toLowerCase().includes(q));
  });
}

function renderDepts() {
  const existing = new Set(DATA.map(d => d.dept));
  const toShow = ALL_DEPTS.filter(d => d === '全部科別' || existing.has(d));
  document.getElementById('deptWrap').innerHTML = toShow.map(d => {
    const color = DEPT_COLORS[d] || '#5b8fa8';
    const isActive = currentDept === d;
    const style = d === '全部科別'
      ? (isActive ? `background:var(--teal);border-color:var(--teal);color:#fff;` : ``)
      : (isActive ? `background:${color};border-color:${color};color:#fff;box-shadow:0 2px 8px ${color}40;` : `border-color:${color}60;color:${color};`);
    return `<button class="dept-btn" style="${style}" onclick="setDept('${d}')">${d}</button>`;
  }).join('');
}

function renderFilters() {
  document.getElementById('filterWrap').innerHTML = [
    { k: 'all', l: '全部麻醉' }, { k: 'etga', l: 'ETGA 全身麻醉' }, { k: 'la', l: 'L.A / IVGS 局部' }
  ].map(f => `<button class="filter-btn ${currentAne === f.k ? 'active' : ''}" onclick="setAne('${f.k}')">${f.l}</button>`).join('');
}

function setDept(d) { currentDept = d; renderDepts(); renderCards(); }
function setAne(k) { currentAne = k; renderFilters(); renderCards(); }
function setView(v) {
  document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.nav-item')[{ all: 0, etga: 1, la: 2 }[v]].classList.add('active');
  setAne(v);
}
function doFilter() { currentSearch = document.getElementById('searchInput').value; renderCards(); }

function aneBadge(a) {
  const u = a.toUpperCase();
  if (u.includes('ETGA')) return `<span class="badge badge-blue">ETGA</span>`;
  if (u.includes('L.A') || u.includes('IVG')) return `<span class="badge badge-green">L.A/IVG</span>`;
  return `<span class="badge badge-amber">${a.split(' ')[0]}</span>`;
}
function deptBadge(d) {
  const color = DEPT_COLORS[d] || '#5b8fa8';
  return `<span class="badge" style="background:${color}18;color:${color};border-color:${color}40;">${d}</span>`;
}
function statusBadge(s) {
  return s === '已審核'
    ? '<span class="badge badge-approved">✓ 已審核</span>'
    : '<span class="badge badge-pending">⏳ 待審核</span>';
}

function updateNotifBanner() {
  if (!currentUser) return;
  const myPending = DATA.filter(s => s.status === '待審核' && canReviewDept(currentUser, s.dept));
  const banner = document.getElementById('notifBanner');
  if (myPending.length > 0) {
    banner.classList.remove('hidden');
    const depts = [...new Set(myPending.map(s => s.dept))].join('、');
    document.getElementById('notifTitle').textContent = `🔴 你有 ${myPending.length} 筆術式待審核`;
    document.getElementById('notifSub').textContent = `科別：${depts} → 點此查看`;
  } else {
    banner.classList.add('hidden');
  }
}

function renderCards() {
  const f = getFiltered();
  const pendingCount = DATA.filter(d => d.status === '待審核' && canReviewDept(currentUser, d.dept)).length;
  let stats = `<div class="stat-pill">顯示 <strong>${f.length}</strong> 筆</div><div class="stat-pill">總計 <strong>${DATA.length}</strong> 筆</div>`;
  if (pendingCount > 0) stats += `<div class="stat-pill" style="border-color:var(--red);color:var(--red);">⏳ 待審核 <strong>${pendingCount}</strong> 筆</div>`;
  document.getElementById('statsBar').innerHTML = stats;
  updateNotifBanner();

  const w = document.getElementById('cardsWrap');
  if (!f.length) {
    w.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">找不到符合的術式</div></div>`;
    return;
  }
  w.innerHTML = f.map((s, i) => `
    <div class="card" style="animation-delay:${i * .02}s;border-left:4px solid ${DEPT_COLORS[s.dept] || '#d4cbbe'};" onclick="openFullpage(${s.id})">
      <div class="card-header">
        <div class="card-title">${s.procedure}</div>
        <button class="card-edit-btn" onclick="event.stopPropagation();openEdit(${s.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>
      <div class="card-meta">
        ${deptBadge(s.dept)}${aneBadge(s.anesthesia)}
        <span class="badge badge-pos">📐 ${s.position}</span>
        ${statusBadge(s.status)}
      </div>
    </div>`).join('');
}

// ===== FULLPAGE =====
function openFullpage(id) {
  fullpageId = id;
  fullpageMode = 'full';
  renderFullpage();
  const fp = document.getElementById('fullpage');
  fp.style.cssText = 'display:block !important;';
  fp.scrollTop = 0;
  document.body.style.overflow = 'hidden';
}
function closeFullpage() {
  document.getElementById('fullpage').style.cssText = 'display:none !important;';
  document.body.style.overflow = '';
  fullpageId = null;
}
function fullpageEdit() { if (fullpageId) openEdit(fullpageId); }
function setFpMode(m) { fullpageMode = m; renderFullpage(); }

function renderFullpage() {
  const s = DATA.find(d => d.id === fullpageId);
  if (!s) return;
  const color = DEPT_COLORS[s.dept] || '#5b8fa8';
  document.getElementById('fp_dept').textContent = s.dept;
  document.getElementById('fp_dept').style.color = color;
  document.getElementById('fp_title').textContent = s.procedure;

  const m = fullpageMode;
  let body = '';
  body += `<div class="fp-meta">${deptBadge(s.dept)}${aneBadge(s.anesthesia)}<span class="badge badge-pos">📐 ${s.position}</span>${statusBadge(s.status)}</div>`;
  body += `<div class="fp-quick"><button class="fp-qbtn ${m === 'full' ? 'active' : ''}" onclick="setFpMode('full')">📋 完整備料</button><button class="fp-qbtn ${m === 'quick' ? 'active' : ''}" onclick="setFpMode('quick')">⚡ 術中快查</button></div>`;

  // Record info
  let rec = `<span>📝 建立者：<strong>${s.author || '—'}</strong></span>`;
  if (s.editor && s.editor !== s.author) rec += `<span>✏️ 修改者：<strong>${s.editor}</strong></span>`;
  body += `<div class="fp-record">${rec}</div>`;

  // Pending notice for reviewers
  if (s.status === '待審核' && canReviewDept(currentUser, s.dept)) {
    body += `<div class="pending-notice">
      <div class="pending-notice-title">⏳ 此術式待審核</div>
      <div class="pending-notice-sub">修改者：${s.editor}　最後修改：${s.modified ? new Date(s.modified).toLocaleDateString('zh-TW') : '—'}</div>
      <button class="btn-review-now" onclick="openReview(${s.id}, null)">✅ 審核通過，正式公佈</button>
    </div>`;
  }

  if (m === 'quick') {
    body += `
      <div class="fp-section"><div class="fp-label c-amber">麻醉 ／ 姿勢</div><div class="fp-content">${s.anesthesia} ｜ ${s.position}</div></div>
      <div class="fp-section"><div class="fp-label c-teal">消毒方式</div><div class="fp-content">${s.disinfect || '—'}</div></div>
    `;
  } else {
    body += `
      <div class="fp-section"><div class="fp-label c-amber">姿勢</div><div class="fp-content">${s.position || '—'}</div></div>
      <div class="fp-section"><div class="fp-label c-teal">消毒方式</div><div class="fp-content">${s.disinfect || '—'}</div></div>
      ${s.tools ? `<div class="fp-section"><div class="fp-label c-accent">準備工具、器械</div><div class="fp-tags">${s.tools.split('/').map(t => t.trim()).filter(Boolean).map(t => `<span class="fp-tag">${t}</span>`).join('')}</div></div>` : ''}
      ${s.supplies ? `<div class="fp-section"><div class="fp-label c-green">耗材</div><div class="fp-tags">${s.supplies.split('/').map(t => t.trim()).filter(Boolean).map(t => `<span class="fp-tag">${t}</span>`).join('')}</div></div>` : ''}
      ${s.implantNotes ? `<div class="fp-section"><div class="fp-label c-amber">特材注意事項</div><div class="fp-content">${s.implantNotes}</div></div>` : ''}
      ${s.doctorHabits ? `<div class="fp-section"><div class="fp-label c-teal">醫生習慣</div><div class="fp-content">${s.doctorHabits}</div></div>` : ''}
      ${s.notes ? `<div class="fp-section"><div class="fp-label c-accent">上刀注意事項</div><div class="fp-content">${s.notes}</div></div>` : ''}
    `;
  }

  document.getElementById('fp_body').innerHTML = body;
}

// ===== MODAL =====
function openModal(id = null) {
  editingId = id;
  const r = id ? DATA.find(d => d.id === id) : null;
  document.getElementById('modalTitle').textContent = id ? '編輯術式' : '新增術式';
  document.getElementById('f_editor').value = currentUser;
  document.getElementById('f_dept').value = r?.dept || '骨科';
  document.getElementById('f_procedure').value = r?.procedure || '';
  document.getElementById('f_anesthesia').value = r?.anesthesia || '';
  document.getElementById('f_position').value = r?.position || '';
  document.getElementById('f_disinfect').value = r?.disinfect || '';
  document.getElementById('f_tools').value = r?.tools || '';
  document.getElementById('f_supplies').value = r?.supplies || '';
  document.getElementById('f_implantNotes').value = r?.implantNotes || '';
  document.getElementById('f_doctorHabits').value = r?.doctorHabits || '';
  document.getElementById('f_notes').value = r?.notes || '';
  document.getElementById('modalOverlay').classList.add('show');
}
function openEdit(id) { closeFullpage(); openModal(id); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); editingId = null; }

async function saveRecord() {
  const p = document.getElementById('f_procedure').value.trim();
  const a = document.getElementById('f_anesthesia').value.trim();
  if (!p || !a) { showToast('⚠️ 術式名稱和麻醉方式為必填'); return; }

  const btnSave = document.getElementById('btnSave');
  btnSave.textContent = '儲存中...';
  btnSave.disabled = true;

  const rec = {
    dept: document.getElementById('f_dept').value,
    procedure: p, anesthesia: a,
    position: document.getElementById('f_position').value.trim(),
    disinfect: document.getElementById('f_disinfect').value.trim(),
    tools: document.getElementById('f_tools').value.trim(),
    supplies: document.getElementById('f_supplies').value.trim(),
    implantNotes: document.getElementById('f_implantNotes').value.trim(),
    doctorHabits: document.getElementById('f_doctorHabits').value.trim(),
    notes: document.getElementById('f_notes').value.trim(),
    status: '待審核'
  };

  try {
    await saveToSP(rec, editingId);
    showToast(editingId ? '✅ 已更新，等待審核' : '✅ 新增成功，等待審核');
    closeModal();
    // Reload data
    document.getElementById('loadingText').textContent = '更新資料中...';
    document.getElementById('loadingScreen').classList.remove('hidden');
    await loadData();
    document.getElementById('loadingScreen').classList.add('hidden');
    renderDepts(); renderFilters(); renderCards();
  } catch (e) {
    showToast('❌ 儲存失敗，請重試');
    console.error(e);
  }
  btnSave.textContent = '送出審核';
  btnSave.disabled = false;
}

// ===== REVIEW =====
function openReview(id, e) {
  if (e) e.stopPropagation();
  reviewTargetId = id;
  selectedReviewer = null;
  const s = DATA.find(d => d.id === id);
  const reviewersList = [...new Set([...(DEPT_REVIEWERS[s.dept] || []), ...ADMINS])];
  document.getElementById('reviewProcName').textContent = `「${s.procedure}」`;
  document.getElementById('reviewerList').innerHTML = reviewersList.map(r =>
    `<button class="reviewer-btn" onclick="selectReviewer('${r}',this)">${r}</button>`
  ).join('');
  document.getElementById('reviewOverlay').classList.add('show');
}
function selectReviewer(name, btn) {
  selectedReviewer = name;
  document.querySelectorAll('.reviewer-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}
function closeReview() { document.getElementById('reviewOverlay').classList.remove('show'); reviewTargetId = null; selectedReviewer = null; }

async function confirmReview() {
  if (!selectedReviewer) { showToast('請選擇審核者姓名'); return; }
  try {
    await saveToSP({ status: '已審核' }, reviewTargetId);
    showToast(`✅ ${selectedReviewer} 審核通過，已正式公佈！`);
    closeReview();
    closeFullpage();
    document.getElementById('loadingScreen').classList.remove('hidden');
    await loadData();
    document.getElementById('loadingScreen').classList.add('hidden');
    renderDepts(); renderFilters(); renderCards();
  } catch (e) {
    showToast('❌ 審核失敗，請重試');
  }
}

// ===== PENDING LIST =====
function openPendingList() {
  const myPending = DATA.filter(s => s.status === '待審核' && canReviewDept(currentUser, s.dept));
  document.getElementById('pendingListSub').textContent = `共 ${myPending.length} 筆術式等待審核`;
  document.getElementById('pendingListContent').innerHTML = myPending.length === 0
    ? '<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">目前沒有待審核術式</div></div>'
    : myPending.map(s => `
      <div class="pending-item">
        <div class="pending-item-proc">${s.procedure}</div>
        <div class="pending-item-meta">
          <span>🏥 <strong>${s.dept}</strong></span>
          <span>✏️ 修改者：<strong>${s.editor || '—'}</strong></span>
        </div>
        <button class="btn-review-now" style="margin-top:8px;" onclick="closePendingList();openReview(${s.id},null)">立即審核</button>
      </div>`).join('');
  document.getElementById('pendingListOverlay').classList.add('show');
}
function closePendingList() { document.getElementById('pendingListOverlay').classList.remove('show'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== INIT =====
async function init() {
  // Check if returning from OAuth
  if (parseToken()) {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('loadingScreen').classList.remove('hidden');
    document.getElementById('loadingText').textContent = '正在取得使用者資訊...';
    try {
      currentUser = await getUserInfo();
      document.getElementById('loadingText').textContent = '正在載入術式資料...';
      await loadData();
      document.getElementById('loadingScreen').classList.add('hidden');
      document.getElementById('mainApp').style.display = 'block';
      document.getElementById('userNameDisplay').textContent = currentUser;
      document.getElementById('userRoleDisplay').textContent = getUserLabel(currentUser);
      renderDepts(); renderFilters(); renderCards();
    } catch (e) {
      document.getElementById('loadingScreen').classList.add('hidden');
      document.getElementById('loginScreen').classList.remove('hidden');
      showToast('❌ 登入失敗，請重試');
    }
  }
}

// Close modals on overlay click
['modalOverlay','reviewOverlay','pendingListOverlay'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target === document.getElementById(id)) {
      document.getElementById(id).classList.remove('show');
    }
  });
});

init();
</script>
</body>
</html>
