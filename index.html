<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf8f3; --surface:#fff; --text:#2c2620; --text2:#6b5f54; --text3:#a8998c;
  --border:#e8e2d6; --border2:#d9d0c2; --sans:"Noto Sans TC",sans-serif; --rs:13px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--sans); background:var(--bg); color:var(--text);
  min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:34px 18px 48px;}
.wrap{width:100%; max-width:460px;}
.head{text-align:center; margin-bottom:6px;}
.logo{font-size:44px; line-height:1; margin-bottom:10px;}
.title{font-size:22px; font-weight:700; letter-spacing:.02em;}
.sub{font-size:15px; color:var(--text3); margin-top:6px;}
.hint{font-size:14px; color:var(--text3); text-align:center; margin:16px 0 20px;}
.grid{display:flex; flex-direction:column; gap:10px;}
.dept-btn{display:flex; align-items:center; justify-content:space-between;
  background:var(--surface); border:1.5px solid var(--border); border-radius:var(--rs);
  padding:17px 18px; cursor:pointer; text-decoration:none; color:var(--text);
  transition:transform .12s, box-shadow .12s, border-color .12s;
  box-shadow:0 1px 2px rgba(44,38,32,.04);}
.dept-btn:active{transform:scale(.985);}
.dept-btn:hover{box-shadow:0 4px 14px rgba(44,38,32,.09); border-color:var(--border2);}
.dept-name{font-size:18px; font-weight:700;}
.chev{font-size:22px; color:var(--text3);}
.foot{text-align:center; font-size:13px; color:var(--text3); margin-top:26px; line-height:1.6;}
</style>
</head>
