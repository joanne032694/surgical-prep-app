<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="骨科備料">
<title>骨科手術備料查詢</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0f1a; --surface: #131929; --surface2: #1a2235;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
  --accent: #3b82f6; --accent2: #60a5fa;
  --green: #22c55e; --amber: #f59e0b; --red: #ef4444; --teal: #14b8a6;
  --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
  --radius: 14px; --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; padding-bottom: 80px; }

/* Header */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.logo { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.header-title { font-size: 17px; font-weight: 700; }
.header-sub { font-size: 11px; color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase; margin-top: 1px; }
.header-actions { margin-left: auto; display: flex; gap: 8px; }
.btn-add { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 7px 14px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; }
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); }
.search-input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-family: inherit; font-size: 15px; padding: 10px 12px 10px 38px; outline: none; transition: border-color 0.2s; }
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text3); }

/* Filter */
.filter-wrap { padding: 10px 16px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); }
.filter-wrap::-webkit-scrollbar { display: none; }
.filter-btn { flex-shrink: 0; padding: 6px 14px; border-radius: 999px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: inherit; font-size: 13px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }

/* Cards */
.cards-wrap { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color 0.15s; }
.card:active { transform: scale(0.99); }
.card-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; cursor: pointer; }
.card-title { font-size: 14px; font-weight: 700; line-height: 1.4; color: var(--text); flex: 1; }
.card-header-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.card-chevron { color: var(--text3); font-size: 18px; transition: transform 0.2s; }
.card.open .card-chevron { transform: rotate(180deg); color: var(--accent2); }
.card-meta { padding: 0 16px 12px; display: flex; flex-wrap: wrap; gap: 6px; }
.badge { font-size: 11px; padding: 3px 9px; border-radius: 999px; font-weight: 500; }
.badge-blue { background: rgba(59,130,246,0.15); color: var(--accent2); }
.badge-green { background: rgba(34,197,94,0.15); color: #4ade80; }
.badge-teal { background: rgba(20,184,166,0.15); color: #2dd4bf; }
.badge-amber { background: rgba(245,158,11,0.15); color: #fbbf24; }
.badge-pending { background: rgba(245,158,11,0.15); color: #fbbf24; font-size: 10px; }
.badge-approved { background: rgba(34,197,94,0.15); color: #4ade80; font-size: 10px; }

/* Edit/Delete buttons on card */
.card-action-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border2); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text3); transition: all 0.15s; }
.card-action-btn:hover { color: var(--text); border-color: var(--text3); }
.card-action-btn.del:hover { color: var(--red); border-color: var(--red); }

/* Detail */
.card-detail { display: none; border-top: 1px solid var(--border); padding: 14px 16px; background: var(--surface2); }
.card.open .card-detail { display: block; }
.quick-strip { display: flex; gap: 8px; margin-bottom: 14px; }
.quick-btn { flex: 1; padding: 9px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--surface); color: var(--text2); font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; text-align: center; transition: all 0.15s; }
.quick-btn.qactive { border-color: var(--accent); color: var(--accent2); background: rgba(59,130,246,0.1); }
.section { margin-bottom: 14px; }
.section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.section-label span { width: 3px; height: 12px; border-radius: 2px; display: inline-block; }
.section-content { font-size: 13px; color: var(--text2); line-height: 1.7; background: var(--surface); border-radius: var(--radius-sm); padding: 10px 12px; border: 1px solid var(--border); }
.tags { display: flex; flex-wrap: wrap; gap: 5px; }
.tag { font-size: 12px; padding: 4px 10px; border-radius: var(--radius-sm); background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text2); }
.note-item { display: flex; gap: 8px; font-size: 13px; color: var(--text2); line-height: 1.6; padding: 6px 0; border-bottom: 1px solid var(--border); }
.note-item:last-child { border-bottom: none; padding-bottom: 0; }
.note-num { width: 20px; height: 20px; border-radius: 50%; background: rgba(59,130,246,0.2); color: var(--accent2); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }

/* Stats */
.stats-bar { padding: 10px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
.stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 4px 12px; font-size: 12px; color: var(--text2); }
.stat-pill strong { color: var(--accent2); }

/* Empty */
.empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 15px; }

/* Bottom nav */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--surface); border-top: 1px solid var(--border); display: flex; padding: 10px 0 16px; z-index: 100; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; color: var(--text3); font-size: 10px; font-weight: 500; transition: color 0.15s; }
.nav-item.active { color: var(--accent2); }
.nav-item svg { width: 22px; height: 22px; }

/* ===== MODAL ===== */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; overflow-y: auto; padding: 20px 16px; }
.modal-overlay.show { display: flex; align-items: flex-start; justify-content: center; }
.modal { background: var(--surface); border-radius: var(--radius); width: 100%; max-width: 448px; padding: 20px; }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; }
.modal-close { width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.08); border: none; cursor: pointer; color: var(--text2); font-size: 18px; display: flex; align-items: center; justify-content: center; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 5px; display: block; }
.form-input, .form-textarea, .form-select { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-family: inherit; font-size: 14px; padding: 9px 12px; outline: none; transition: border-color 0.2s; }
.form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
.form-textarea { resize: vertical; min-height: 70px; line-height: 1.6; }
.form-select option { background: #1a2235; }
.form-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-cancel { flex: 1; padding: 11px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-save { flex: 2; padding: 11px; border-radius: var(--radius-sm); border: none; background: var(--accent); color: #fff; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; }

/* Confirm dialog */
.confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
.confirm-overlay.show { display: flex; }
.confirm-box { background: var(--surface); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 320px; text-align: center; }
.confirm-icon { font-size: 40px; margin-bottom: 12px; }
.confirm-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.confirm-msg { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 20px; }
.confirm-actions { display: flex; gap: 10px; }
.btn-confirm-cancel { flex: 1; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: inherit; font-size: 14px; cursor: pointer; }
.btn-confirm-ok { flex: 1; padding: 10px; border-radius: var(--radius-sm); border: none; background: var(--red); color: #fff; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; }

/* Toast */
.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1e293b; border: 1px solid var(--border2); color: var(--text); font-size: 13px; padding: 10px 18px; border-radius: 999px; z-index: 400; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">🦴</div>
    <div>
      <div class="header-title">骨科手術備料查詢</div>
      <div class="header-sub">Orthopedic Surgical Prep</div>
    </div>
    <div class="header-actions">
      <button class="btn-add" onclick="openModal()">＋ 新增</button>
    </div>
  </div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" type="text" id="searchInput" placeholder="搜尋術式、器械、耗材..." oninput="doFilter()">
  </div>
</div>

<div class="filter-wrap" id="filterWrap"></div>
<div class="stats-bar" id="statsBar"></div>
<div class="cards-wrap" id="cardsWrap"></div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="setView('all')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    全部術式
  </div>
  <div class="nav-item" onclick="setView('etga')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4m0 0h18"/></svg>
    全身麻醉
  </div>
  <div class="nav-item" onclick="setView('la')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    局部麻醉
  </div>
</div>

<!-- Edit/Add Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">
      <span id="modalTitle">新增術式</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">術式名稱 *</label>
      <input class="form-input" id="f_procedure" type="text" placeholder="例：Total Knee Replacement">
    </div>
    <div class="form-group">
      <label class="form-label">麻醉方式 *</label>
      <input class="form-input" id="f_anesthesia" type="text" placeholder="例：ETGA / L.A or IVGS">
    </div>
    <div class="form-group">
      <label class="form-label">手術姿勢</label>
      <input class="form-input" id="f_position" type="text" placeholder="例：平臥 / 半坐臥 / 側臥">
    </div>
    <div class="form-group">
      <label class="form-label">消毒方式</label>
      <input class="form-input" id="f_disinfect" type="text" placeholder="例：Alc-BI / 2%CHG">
    </div>
    <div class="form-group">
      <label class="form-label">工具 / 器械</label>
      <textarea class="form-textarea" id="f_tools" placeholder="每項用「/」隔開，例：骨科大基本包(POR01) / 電鑽(OCDRZ3)"></textarea>
      <div class="form-hint">用「/」分隔多個項目</div>
    </div>
    <div class="form-group">
      <label class="form-label">耗材</label>
      <textarea class="form-textarea" id="f_supplies" placeholder="每項用「/」隔開，例：10號刀片 / 20號刀片 / 紗球"></textarea>
      <div class="form-hint">用「/」分隔多個項目</div>
    </div>
    <div class="form-group">
      <label class="form-label">藥物</label>
      <input class="form-input" id="f_meds" type="text" placeholder="例：2%Xylocaine+E">
    </div>
    <div class="form-group">
      <label class="form-label">骨材備註</label>
      <textarea class="form-textarea" id="f_implantNotes" placeholder="骨材相關注意事項"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">醫生習慣</label>
      <textarea class="form-textarea" id="f_doctorHabits" placeholder="各醫生習慣差異"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">注意事項</label>
      <textarea class="form-textarea" id="f_notes" placeholder="手術注意事項"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">狀態</label>
      <select class="form-select" id="f_status">
        <option value="待審核">待審核</option>
        <option value="已審核">已審核</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveRecord()">儲存</button>
    </div>
  </div>
</div>

<!-- Confirm Delete Dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title">確定要刪除？</div>
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-actions">
      <button class="btn-confirm-cancel" onclick="closeConfirm()">取消</button>
      <button class="btn-confirm-ok" onclick="confirmDelete()">刪除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// Load data from localStorage or use defaults
function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA)); } catch(e) {}
}

let DATA = loadData();
let currentFilter = 'all';
let currentSearch = '';
let openId = null;
let quickMode = {};
let editingId = null;
let deleteTargetId = null;

function getFiltered() {
  return DATA.filter(s => {
    const ane = s.anesthesia.toUpperCase();
    const matchFilter =
      currentFilter === 'all' ||
      (currentFilter === 'etga' && (ane.includes('ETGA') || ane.includes('SPINAL') || ane.includes('SA') || ane.includes('MASK'))) ||
      (currentFilter === 'la' && (ane.includes('L.A') || ane.includes('IVG') || ane.includes('LOCAL')));
    if (!matchFilter) return false;
    if (!currentSearch) return true;
    const q = currentSearch.toLowerCase();
    return s.procedure.toLowerCase().includes(q) ||
      (s.tools||[]).join(' ').toLowerCase().includes(q) ||
      (s.supplies||[]).join(' ').toLowerCase().includes(q) ||
      s.position.toLowerCase().includes(q) ||
      s.anesthesia.toLowerCase().includes(q) ||
      (s.notes||'').toLowerCase().includes(q) ||
      (s.doctorHabits||'').toLowerCase().includes(q);
  });
}

function renderFilters() {
  const filters = [
    { key: 'all', label: '全部' },
    { key: 'etga', label: 'ETGA 全身麻醉' },
    { key: 'la', label: 'L.A / IVGS 局部' },
  ];
  document.getElementById('filterWrap').innerHTML = filters.map(f =>
    `<button class="filter-btn ${currentFilter===f.key?'active':''}" onclick="setFilter('${f.key}')">${f.label}</button>`
  ).join('');
}

function setFilter(key) { currentFilter=key; renderFilters(); renderCards(); }
function setView(v) {
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const map={all:0,etga:1,la:2};
  document.querySelectorAll('.nav-item')[map[v]].classList.add('active');
  setFilter(v);
}
function doFilter() { currentSearch=document.getElementById('searchInput').value; renderCards(); }

function aneBadge(ane) {
  const u = ane.toUpperCase();
  if (u.includes('ETGA')) return '<span class="badge badge-blue">ETGA</span>';
  if (u.includes('L.A') || u.includes('IVG')) return '<span class="badge badge-green">L.A / IVG</span>';
  return `<span class="badge badge-amber">${ane}</span>`;
}
function posBadge(pos) { return `<span class="badge badge-teal">📐 ${pos}</span>`; }
function statusBadge(s) {
  if (!s) return '';
  return s === '已審核'
    ? '<span class="badge badge-approved">✓ 已審核</span>'
    : '<span class="badge badge-pending">⏳ 待審核</span>';
}

function toggleCard(id) {
  openId = openId===id ? null : id;
  renderCards();
  if (openId) {
    setTimeout(()=>{
      const el=document.getElementById('card-'+openId);
      if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
    },50);
  }
}
function setQuick(id,mode,e) { e.stopPropagation(); quickMode[id]=mode; renderCards(); }

function renderDetail(s) {
  const mode = quickMode[s.id]||'full';
  const quickContent = mode==='quick' ? `
    <div class="section"><div class="section-label"><span style="background:var(--amber)"></span>麻醉 / 姿勢</div><div class="section-content">${s.anesthesia}｜${s.position}</div></div>
    <div class="section"><div class="section-label"><span style="background:var(--accent)"></span>消毒方式</div><div class="section-content">${s.disinfect}</div></div>
    ${s.meds?`<div class="section"><div class="section-label"><span style="background:var(--red)"></span>藥物</div><div class="section-content" style="color:#fca5a5;font-weight:500;">${s.meds}</div></div>`:''}
  ` : `
    <div class="section"><div class="section-label"><span style="background:var(--amber)"></span>姿勢</div><div class="section-content">${s.position||'—'}</div></div>
    <div class="section"><div class="section-label"><span style="background:var(--teal)"></span>消毒方式</div><div class="section-content">${s.disinfect||'—'}</div></div>
    ${(s.tools&&s.tools.length)?`<div class="section"><div class="section-label"><span style="background:var(--accent)"></span>工具 / 器械</div><div class="tags">${s.tools.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>`:''}
    ${(s.supplies&&s.supplies.length)?`<div class="section"><div class="section-label"><span style="background:var(--green)"></span>耗材</div><div class="tags">${s.supplies.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>`:''}
    ${s.meds?`<div class="section"><div class="section-label"><span style="background:var(--red)"></span>藥物</div><div class="section-content" style="color:#fca5a5;font-weight:500;">${s.meds}</div></div>`:''}
    ${s.implantNotes?`<div class="section"><div class="section-label"><span style="background:var(--amber)"></span>骨材備註</div><div class="section-content">${s.implantNotes}</div></div>`:''}
    ${s.doctorHabits?`<div class="section"><div class="section-label"><span style="background:var(--teal)"></span>醫生習慣</div><div class="section-content">${s.doctorHabits}</div></div>`:''}
    ${s.notes?`<div class="section"><div class="section-label"><span style="background:var(--amber)"></span>注意事項</div><div class="section-content">${s.notes}</div></div>`:''}
  `;
  return `<div class="card-detail">
    <div class="quick-strip">
      <button class="quick-btn ${mode==='full'?'qactive':''}" onclick="setQuick(${s.id},'full',event)">📋 完整備料</button>
      <button class="quick-btn ${mode==='quick'?'qactive':''}" onclick="setQuick(${s.id},'quick',event)">⚡ 術中快查</button>
    </div>
    ${quickContent}
  </div>`;
}

  const wrap = document.getElementById('cardsWrap');

  if (!filtered.length) {
    wrap.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">找不到符合的術式</div></div>`;
    return;
  }
  wrap.innerHTML = filtered.map(s => `
    <div class="card ${openId===s.id?'open':''}" id="card-${s.id}">
      <div class="card-header" onclick="toggleCard(${s.id})">
        <div class="card-title">${s.procedure}</div>
        <div class="card-header-right">
          <button class="card-action-btn" title="編輯" onclick="openEdit(${s.id},event)">

          </button>
          <button class="card-action-btn del" title="刪除" onclick="openDelete(${s.id},event)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
          <svg class="card-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="card-meta">
        ${aneBadge(s.anesthesia)}
        ${posBadge(s.position)}
        ${statusBadge(s.status)}
      </div>
      ${openId===s.id ? renderDetail(s) : ''}
    </div>
  `).join('');
}

// ===== MODAL =====
function openModal(id=null) {
  editingId = id;
  const rec = id ? DATA.find(d=>d.id===id) : null;
  document.getElementById('modalTitle').textContent = id ? '編輯術式' : '新增術式';
  document.getElementById('f_procedure').value = rec?.procedure||'';
  document.getElementById('f_anesthesia').value = rec?.anesthesia||'';
  document.getElementById('f_position').value = rec?.position||'';
  document.getElementById('f_disinfect').value = rec?.disinfect||'';
  document.getElementById('f_tools').value = (rec?.tools||[]).join(' / ');
  document.getElementById('f_supplies').value = (rec?.supplies||[]).join(' / ');
  document.getElementById('f_meds').value = rec?.meds||'';
  document.getElementById('f_implantNotes').value = rec?.implantNotes||'';
  document.getElementById('f_doctorHabits').value = rec?.doctorHabits||'';
  document.getElementById('f_notes').value = rec?.notes||'';
  document.getElementById('f_status').value = rec?.status||'待審核';
  document.getElementById('modalOverlay').classList.add('show');
}
function openEdit(id, e) { e.stopPropagation(); openModal(id); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); editingId=null; }

function saveRecord() {
  const procedure = document.getElementById('f_procedure').value.trim();
  const anesthesia = document.getElementById('f_anesthesia').value.trim();
  if (!procedure || !anesthesia) { showToast('⚠️ 術式名稱和麻醉方式為必填'); return; }
  const splitItems = v => v.split('/').map(t=>t.trim()).filter(Boolean);
  const rec = {
    id: editingId || (Math.max(0,...DATA.map(d=>d.id))+1),
    dept: '骨科',
    procedure,
    anesthesia,
    position: document.getElementById('f_position').value.trim(),
    disinfect: document.getElementById('f_disinfect').value.trim(),
    tools: splitItems(document.getElementById('f_tools').value),
    supplies: splitItems(document.getElementById('f_supplies').value),
    meds: document.getElementById('f_meds').value.trim(),
    implantNotes: document.getElementById('f_implantNotes').value.trim(),
    doctorHabits: document.getElementById('f_doctorHabits').value.trim(),
    notes: document.getElementById('f_notes').value.trim(),
    status: document.getElementById('f_status').value,
  };
  if (editingId) {
    const idx = DATA.findIndex(d=>d.id===editingId);
    DATA[idx] = rec;
    showToast('✅ 已更新');
  } else {
    DATA.push(rec);
    showToast('✅ 新增成功');
  }
  saveData();
  closeModal();
  renderCards();
}

// ===== DELETE =====
function openDelete(id, e) {
  e.stopPropagation();
  deleteTargetId = id;
  const rec = DATA.find(d=>d.id===id);
  document.getElementById('confirmMsg').textContent = `「${rec?.procedure}」將永久刪除，無法復原。`;
  document.getElementById('confirmOverlay').classList.add('show');
}
function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('show'); deleteTargetId=null; }
function confirmDelete() {
  if (!deleteTargetId) return;
  DATA = DATA.filter(d=>d.id!==deleteTargetId);
  if (openId===deleteTargetId) openId=null;
  saveData();
  closeConfirm();
  renderCards();
  showToast('🗑️ 已刪除');
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target===document.getElementById('modalOverlay')) closeModal(); });

renderFilters();
renderCards();
</script>
</body>
</html>
