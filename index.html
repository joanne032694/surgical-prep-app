<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="手術用物手冊">
<title>手術室手術用物準備手冊</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5b8fa8">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf8f3;--bg2:#f5f2eb;--surface:#fff;--surface2:#fdf9f2;
  --border:#e8e2d6;--border2:#d4cbbe;
  --accent:#5b8fa8;--accent2:#4a7a94;--accent-dim:rgba(91,143,168,0.1);--accent-dim2:rgba(91,143,168,0.18);
  --green:#4a9e7a;--green-dim:rgba(74,158,122,0.1);
  --amber:#c8813a;--amber-dim:rgba(200,129,58,0.12);
  --red:#c0464a;--red-dim:rgba(192,70,74,0.1);
  --teal:#3a9090;--teal-dim:rgba(58,144,144,0.1);
  --text:#2c2620;--text2:#6b5f54;--text3:#a8998c;
  --sans:"Noto Sans TC",sans-serif;--r:12px;--rs:8px;
  --shadow:0 1px 4px rgba(0,0,0,0.06),0 2px 12px rgba(0,0,0,0.04);
  --shadow2:0 2px 8px rgba(0,0,0,0.08),0 4px 20px rgba(0,0,0,0.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:90px;}
.login-screen{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 28px;}
.login-screen.hidden{display:none;}
.login-logo{font-size:58px;margin-bottom:16px;}
.login-title{font-size:24px;font-weight:700;color:var(--text);margin-bottom:6px;text-align:center;}
.login-sub{font-size:16px;color:var(--text3);margin-bottom:36px;text-align:center;line-height:1.6;}
.login-field{width:100%;max-width:320px;margin-bottom:12px;}
.login-label{font-size:14px;font-weight:700;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;display:block;}
.login-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:var(--sans);font-size:19px;padding:12px 14px;outline:none;transition:all .2s;}
.login-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
.login-btn{width:100%;max-width:320px;background:var(--accent);border:none;border-radius:var(--rs);color:#fff;font-family:var(--sans);font-size:18px;font-weight:700;padding:14px;cursor:pointer;transition:all .2s;box-shadow:0 2px 10px rgba(91,143,168,0.35);margin-top:4px;}
.login-btn:active{transform:scale(.98);}
.user-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;}
.user-name{font-size:15px;font-weight:700;color:var(--accent2);}
.user-role{font-size:13px;color:var(--text3);margin-left:6px;}
.logout-btn{font-size:14px;color:var(--text3);background:none;border:1px solid var(--border2);border-radius:999px;padding:4px 12px;cursor:pointer;}
.header{background:rgba(250,248,243,0.97);border-bottom:1px solid var(--border);padding:14px 16px 12px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);}
.header-top{display:flex;align-items:center;gap:11px;margin-bottom:11px;}
.logo{width:40px;height:40px;background:linear-gradient(135deg,#e8f0f5,#d4e6f0);border:1px solid var(--border2);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:var(--shadow);}
.header-info{flex:1;}
.header-title{font-size:20px;font-weight:700;color:var(--text);}
.header-sub{font-size:14px;color:var(--text3);margin-top:1px;}
.btn-add{background:var(--accent);border:none;border-radius:var(--rs);color:#fff;font-family:var(--sans);font-size:16px;font-weight:700;padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:5px;box-shadow:0 2px 8px rgba(91,143,168,0.3);white-space:nowrap;}
.search-wrap{position:relative;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
.search-input{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:var(--sans);font-size:17px;padding:10px 12px 10px 38px;outline:none;transition:all .2s;}
.search-input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-dim);}
.search-input::placeholder{color:var(--text3);}
.dept-wrap{padding:9px 14px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;background:var(--surface2);border-bottom:1px solid var(--border);}
.dept-wrap::-webkit-scrollbar{display:none;}
.dept-btn{flex-shrink:0;padding:6px 14px;border-radius:999px;border:1.5px solid var(--border2);background:transparent;color:var(--text3);font-family:var(--sans);font-size:15px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.filter-wrap{padding:7px 14px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;background:var(--surface2);border-bottom:1px solid var(--border);}
.filter-wrap::-webkit-scrollbar{display:none;}
.filter-btn{flex-shrink:0;padding:5px 12px;border-radius:999px;border:1.5px solid var(--border);background:transparent;color:var(--text3);font-family:var(--sans);font-size:15px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.filter-btn.active{background:var(--accent-dim2);border-color:var(--accent);color:var(--accent2);font-weight:600;}
.stats-bar{padding:8px 16px;display:flex;gap:8px;flex-wrap:wrap;background:var(--bg2);border-bottom:1px solid var(--border);}
.stat-pill{font-size:14px;color:var(--text3);padding:3px 10px;background:var(--surface);border:1px solid var(--border);border-radius:999px;}
.stat-pill strong{color:var(--accent2);font-weight:700;}
.cards-wrap{padding:12px 14px;display:flex;flex-direction:column;gap:10px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);animation:fadeUp .25s ease both;}
.card.open{border-color:var(--accent);box-shadow:var(--shadow2),0 0 0 2px var(--accent-dim);}
.card.has-pending{border-color:var(--amber);box-shadow:var(--shadow),0 0 0 1px rgba(200,129,58,0.2);}
.card-header{padding:13px 14px 10px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;cursor:pointer;}
.card-title{font-size:18px;font-weight:700;line-height:1.4;color:var(--text);flex:1;}
.card-header-right{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.card-chevron{color:var(--text3);transition:transform .25s,color .2s;}
.card.open .card-chevron{transform:rotate(180deg);color:var(--accent);}
.card-meta{padding:0 14px 11px;display:flex;flex-wrap:wrap;gap:5px;}
.badge{font-size:14px;padding:3px 9px;border-radius:5px;font-weight:600;border:1px solid transparent;}
.badge-blue{background:rgba(91,143,168,0.12);color:var(--accent2);border-color:rgba(91,143,168,0.2);}
.badge-green{background:var(--green-dim);color:var(--green);border-color:rgba(74,158,122,0.2);}
.badge-amber{background:var(--amber-dim);color:var(--amber);border-color:rgba(200,129,58,0.2);}
.badge-pos{background:rgba(168,153,140,0.1);color:var(--text2);border-color:var(--border);font-size:14px;}
.badge-pending{background:var(--amber-dim);color:var(--amber);border-color:rgba(200,129,58,0.3);font-size:13px;}
.badge-approved{background:var(--green-dim);color:var(--green);border-color:rgba(74,158,122,0.3);font-size:13px;}
.badge-draft{background:rgba(200,129,58,0.1);color:var(--amber);border-color:rgba(200,129,58,0.3);font-size:13px;}
.card-action-btn{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .15s;}
.card-action-btn:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-dim);}
.card-detail{display:none;border-top:1.5px solid var(--border);padding:14px;background:var(--bg2);}
.card.open .card-detail{display:block;}
.quick-strip{display:flex;gap:7px;margin-bottom:12px;}
.quick-btn{flex:1;padding:9px;border-radius:var(--rs);border:1.5px solid var(--border2);background:var(--surface);color:var(--text3);font-family:var(--sans);font-size:15px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s;}
.quick-btn.qactive{border-color:var(--accent);color:var(--accent2);background:var(--accent-dim);font-weight:700;}
.record-info{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:5px 14px;}
.record-info span{font-size:14px;color:var(--text3);display:flex;align-items:center;gap:3px;}
.record-info strong{color:var(--text2);font-weight:600;}
.pending-notice{background:linear-gradient(135deg,rgba(200,129,58,0.1),rgba(200,129,58,0.05));border:1px solid rgba(200,129,58,0.3);border-radius:var(--rs);padding:10px 12px;margin-bottom:10px;}
.pending-notice-title{font-size:14px;font-weight:700;color:var(--amber);margin-bottom:4px;}
.pending-notice-sub{font-size:14px;color:var(--text2);line-height:1.5;}
.btn-review{background:var(--green);border:none;border-radius:6px;color:#fff;font-family:var(--sans);font-size:15px;font-weight:700;padding:7px 14px;cursor:pointer;margin-top:8px;transition:all .2s;}
.btn-review:active{transform:scale(.97);}
.section{margin-bottom:12px;}
.section-label{font-size:15px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.section-label::before{content:"";width:3px;height:13px;border-radius:2px;background:currentColor;opacity:0.6;flex-shrink:0;}
.c-accent{color:var(--accent2)}.c-green{color:var(--green)}.c-amber{color:var(--amber)}.c-teal{color:var(--teal)}.c-red{color:var(--red)}.c-blue{color:#5b8fa8}
.section-content{font-size:16px;color:var(--text2);line-height:1.8;background:var(--surface);border-radius:var(--rs);padding:10px 12px;border:1px solid var(--border);}
.tags{display:flex;flex-wrap:wrap;gap:5px;}
.tag{font-size:15px;padding:5px 11px;border-radius:var(--rs);background:var(--surface);border:1px solid var(--border2);color:var(--text2);}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(250,248,243,0.97);border-top:1px solid var(--border);display:flex;padding:10px 0 18px;z-index:100;backdrop-filter:blur(20px);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--text3);font-size:13px;font-weight:500;transition:color .15s;}
.nav-item.active{color:var(--accent);}
.nav-item svg{width:22px;height:22px;}
.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-icon{font-size:46px;margin-bottom:12px;opacity:0.4;}
.empty-text{font-size:16px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,38,32,0.5);z-index:200;overflow-y:auto;padding:20px 14px;backdrop-filter:blur(6px);}
.modal-overlay.show{display:flex;align-items:flex-start;justify-content:center;}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;width:100%;max-width:448px;padding:20px;box-shadow:0 8px 40px rgba(0,0,0,0.15);}
.modal-title{font-size:19px;font-weight:700;color:var(--text);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.modal-notice{font-size:14px;color:var(--amber);background:var(--amber-dim);border-radius:6px;padding:7px 10px;margin-bottom:14px;line-height:1.5;}
.modal-close{width:28px;height:28px;border-radius:50%;background:var(--bg2);border:1px solid var(--border2);cursor:pointer;color:var(--text3);font-size:16px;display:flex;align-items:center;justify-content:center;}
.form-group{margin-bottom:12px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.form-label{font-size:14px;font-weight:700;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:5px;display:block;}
.form-input,.form-textarea,.form-select{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:var(--sans);font-size:17px;padding:9px 11px;outline:none;transition:all .2s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-dim);}
.form-textarea{resize:vertical;min-height:66px;line-height:1.6;}
.form-hint{font-size:14px;color:var(--text3);margin-top:3px;}
.modal-actions{display:flex;gap:9px;margin-top:16px;}
.btn-cancel{flex:1;padding:11px;border-radius:var(--rs);border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--sans);font-size:17px;cursor:pointer;}
.btn-save{flex:2;padding:11px;border-radius:var(--rs);border:none;background:var(--accent);color:#fff;font-family:var(--sans);font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(91,143,168,0.3);}
.review-modal{background:var(--surface);border:1.5px solid rgba(74,158,122,0.3);border-radius:14px;width:100%;max-width:380px;padding:24px;box-shadow:0 8px 40px rgba(0,0,0,0.15);}
.review-modal-icon{font-size:40px;margin-bottom:10px;text-align:center;}
.review-modal-title{font-size:19px;font-weight:700;color:var(--text);margin-bottom:4px;text-align:center;}
.review-modal-proc{font-size:16px;color:var(--text2);margin-bottom:6px;text-align:center;font-weight:600;}
.review-modal-sub{font-size:15px;color:var(--text3);margin-bottom:16px;text-align:center;line-height:1.5;}
.reviewer-list{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.reviewer-btn{padding:12px 16px;border-radius:var(--rs);border:1.5px solid var(--border2);background:var(--bg2);color:var(--text);font-family:var(--sans);font-size:17px;font-weight:500;cursor:pointer;transition:all .15s;text-align:left;}
.reviewer-btn.selected{border-color:var(--green);background:var(--green-dim);color:var(--green);font-weight:700;}
.review-actions{display:flex;gap:8px;}
.btn-review-cancel{flex:1;padding:11px;border-radius:var(--rs);border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--sans);font-size:16px;cursor:pointer;}
.btn-review-ok{flex:2;padding:11px;border-radius:var(--rs);border:none;background:var(--green);color:#fff;font-family:var(--sans);font-size:16px;font-weight:700;cursor:pointer;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:#fff;font-size:16px;padding:10px 18px;border-radius:999px;z-index:400;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.2);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.notif-banner{background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;transition:all .2s;}
.notif-banner:active{opacity:.85;}
.notif-banner.hidden{display:none;}
.notif-left{display:flex;align-items:center;gap:10px;}
.notif-icon{font-size:22px;}
.notif-title{font-size:15px;font-weight:700;}
.notif-sub{font-size:12px;opacity:.9;margin-top:1px;}
.notif-arrow{font-size:20px;opacity:.8;}
.pending-modal{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;width:100%;max-width:448px;padding:20px;box-shadow:0 8px 40px rgba(0,0,0,0.15);max-height:85vh;overflow-y:auto;}
.pending-modal-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
.pending-modal-sub{font-size:13px;color:var(--text3);margin-bottom:16px;}
.pending-item{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:13px 14px;margin-bottom:10px;cursor:pointer;transition:all .15s;}
.pending-item-proc{font-size:15px;font-weight:700;color:var(--text);margin-bottom:5px;}
.pending-item-meta{font-size:12px;color:var(--text3);display:flex;flex-wrap:wrap;gap:6px 14px;}
.btn-review-now{background:var(--green);border:none;border-radius:6px;color:#fff;font-family:var(--sans);font-size:13px;font-weight:700;padding:6px 14px;cursor:pointer;margin-top:8px;transition:all .2s;display:inline-block;}
.diff-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:9px 11px;margin-bottom:7px;}
.diff-label{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:5px;}
.diff-old{font-size:12px;color:var(--text3);margin-bottom:4px;padding:5px 8px;background:rgba(168,153,140,0.08);border-radius:4px;text-decoration:line-through;opacity:0.7;}
.diff-new{font-size:13px;color:var(--red);padding:5px 8px;background:rgba(192,70,74,0.06);border-radius:4px;border-left:3px solid var(--red);}
.diff-tag{font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;margin-right:5px;letter-spacing:0.04em;}
.diff-tag.old{background:rgba(168,153,140,0.15);color:var(--text3);}
.diff-tag.new{background:rgba(192,70,74,0.15);color:var(--red);}
.dept-眼科{--dc:#e74c8b;--dc-bg:rgba(231,76,139,0.1);--dc-border:rgba(231,76,139,0.25);}
.dept-一般外科{--dc:#e86b2a;--dc-bg:rgba(232,107,42,0.1);--dc-border:rgba(232,107,42,0.25);}
.dept-直腸外科{--dc:#d4572a;--dc-bg:rgba(212,87,42,0.1);--dc-border:rgba(212,87,42,0.25);}
.dept-胸腔外科{--dc:#3a7bd5;--dc-bg:rgba(58,123,213,0.1);--dc-border:rgba(58,123,213,0.25);}
.dept-乳房外科{--dc:#c0478a;--dc-bg:rgba(192,71,138,0.1);--dc-border:rgba(192,71,138,0.25);}
.dept-小兒外科{--dc:#27ae8f;--dc-bg:rgba(39,174,143,0.1);--dc-border:rgba(39,174,143,0.25);}
.dept-神經外科{--dc:#7c5fd4;--dc-bg:rgba(124,95,212,0.1);--dc-border:rgba(124,95,212,0.25);}
.dept-整形外科{--dc:#e0903a;--dc-bg:rgba(224,144,58,0.1);--dc-border:rgba(224,144,58,0.25);}
.dept-骨科{--dc:#2e86c1;--dc-bg:rgba(46,134,193,0.1);--dc-border:rgba(46,134,193,0.25);}
.dept-泌尿科{--dc:#16a085;--dc-bg:rgba(22,160,133,0.1);--dc-border:rgba(22,160,133,0.25);}
.dept-耳鼻喉科{--dc:#d4b030;--dc-bg:rgba(212,176,48,0.1);--dc-border:rgba(212,176,48,0.25);}
.dept-心臟外科{--dc:#c0392b;--dc-bg:rgba(192,57,43,0.1);--dc-border:rgba(192,57,43,0.25);}
.dept-口腔外科{--dc:#7d6608;--dc-bg:rgba(125,102,8,0.1);--dc-border:rgba(125,102,8,0.25);}
.dept-達文西手術{--dc:#1abc9c;--dc-bg:rgba(26,188,156,0.1);--dc-border:rgba(26,188,156,0.25);}
.dept-婦產科{--dc:#e056a0;--dc-bg:rgba(224,86,160,0.1);--dc-border:rgba(224,86,160,0.25);}
[class*="dept-"].card{border-left:4px solid var(--dc,var(--border2));}
[class*="dept-"].card.open{border-color:var(--dc,var(--accent));box-shadow:var(--shadow2),0 0 0 2px var(--dc-bg,var(--accent-dim));}
[class*="dept-"] .badge-dept{background:var(--dc-bg);color:var(--dc);border-color:var(--dc-border);}
</style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="login-logo">🏥</div>
  <div class="login-title">手術室手術用物準備手冊</div>

<script>
const STORAGE_KEY='surgical_prep_v4';
const ALL_DEPTS=['全部科別','眼科','一般外科','直腸外科','胸腔外科','乳房外部','小兒外科','神經外科','整形外科','骨科','泌尿科','耳鼻喉科','心臟外科','口腔外科','達文西手術','婦產科'];
const DEPT_REVIEWERS={"眼科":["王嘉羚","張佩琪"],"一般外科":["李靜怡","張瑋恩"],"直腸外科":["李靜怡","張瑋恩"],"胸腔外科":["李靜怡","張瑋恩"],"乳房外科":["李靜怡","張瑋恩"],"小兒外科":["李靜怡","張瑋恩"],"神經外科":["羅秀如","程郁淳"],"整形外科":["王玉仙","辜嬿潔"],"骨科":["卓湘晴","黃淑樺","徐禾沐"],"泌尿科":["郭妍伶","林靜子"],"耳鼻喉科":["洪怡婷"],"心臟外科":["黃怡婷","汪瑄柔","陳玉茹"],"口腔外科":["林昕澄","謝佩芳"],"達文西手術":["高靖緹","周芳怡"],"婦產科":["楊衣甄"]};
const ADMINS=["王婷婷","蕭帆妤"];
const DEFAULT_DATA=[{"id":1,"dept":"骨科","procedure":"Acromioplasty & Rotator Cuff Repair","anesthesia":"ETGA","position":"半坐臥","disinfect":"Alc-BI(謝、戴、吳) / 2%CHG(許、王、賴、林)","tools":["骨科大基本包(POR01)","Mini Bur(OMB-1)","電鑽(OCDRZ3)","Mini Saw(OCMSZ-1)","Osteotome(OSTM-4)","K-Pin(OKP-1)","Bone file(KOR12)","Right Angle中(C0008M)","小Rongeur(GOR01A)"],"supplies":["10號刀片","20號刀片","4吋襪套+紗繃","OP site 28×30","但丁","Suction tube","清潔片","三角巾","記號筆","Bone Wax","電燒及導電片","Ti-Cron 5號、2號","紗球"],"meds":"","implantNotes":"1.手術可用錨釘或不用，術前先與醫師確認 2.錨釘有分健保與自費，需廠商事先送來 3.術前確認是否有送器械及廠商跟刀","doctorHabits":"Dr.戴：消毒Alc-BI，術後A.T.K消毒，OP site 30×28，縫線1/0+2/0+4/0 Polysorb角針+美容膠+白紗+3M+三角巾 / Dr.吳：消毒Alc-BI，縫線1/0+2/0 Vicryl+4/0 Polysorb / Dr.許：消毒2%CHG，縫線1/0+2/0 Vicryl+4/0 Nylon+Tetra藥膏","notes":"1.病人半坐臥，Myostand要先鋪起來 2.多上1包中單 3.Saw、Burr、Drill by order再上","status":"已審核","author":"原編著","editor":"","editorDate":"","reviewer":"","reviewDate":"","pending":null}];

function isReviewer(name){return ADMINS.includes(name)||Object.values(DEPT_REVIEWERS).some(a=>a.includes(name));}
function canReviewDept(name,dept){return ADMINS.includes(name)||(DEPT_REVIEWERS[dept]||[]).includes(name);}
function getUserLabel(name){
  if(ADMINS.includes(name))return'全科管理員';
  const depts=Object.entries(DEPT_REVIEWERS).filter(([d,a])=>a.includes(name)).map(([d])=>d);
  if(depts.length)return depts.join('、')+' 審核者';
  return'編輯者';
}
function loadData(){try{const s=localStorage.getItem(STORAGE_KEY);if(s)return JSON.parse(s);}catch(e){}return JSON.parse(JSON.stringify(DEFAULT_DATA));}
function saveData(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(DATA));}catch(e){}}

let DATA=[];
let currentUser=null;
let currentDept='全部科別',currentAne='all',currentSearch='',openId=null,quickMode={},editingId=null,reviewTargetId=null,selectedReviewer=null;

function doLogin(){
  const name=document.getElementById('loginName').value.trim();
  if(!name){showToast('請輸入姓名');return;}
  currentUser=name;
  DATA=loadData();
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainApp').style.display='block';
  document.getElementById('userNameDisplay').textContent=name;
  document.getElementById('userRoleDisplay').textContent='｜'+getUserLabel(name);
  renderDepts();renderFilters();renderCards();updateNotifBanner();
}
function doLogout(){
  currentUser=null;
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('mainApp').style.display='none';
  document.getElementById('loginName').value='';
}
document.getElementById('loginName').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function getFiltered(){
  return DATA.filter(s=>{
    const deptOk=currentDept==='全部科別'||s.dept===currentDept;
    const u=s.anesthesia.toUpperCase();
    const aneOk=currentAne==='all'
      ||(currentAne==='etga'&&(u.includes('ETGA')||u.includes('SPINAL')||u.includes('SA')||u.includes('MASK')))
      ||(currentAne==='la'&&(u.includes('L.A')||u.includes('IVG')||u.includes('LOCAL')));
    if(!deptOk||!aneOk)return false;
    if(!currentSearch)return true;
    const q=currentSearch.toLowerCase();
    return[s.procedure,s.anesthesia,s.position,s.dept,(s.tools||[]).join(' '),(s.supplies||[]).join(' '),s.notes||'',s.doctorHabits||'',s.implantNotes||''].some(v=>v.toLowerCase().includes(q));
  });
}

const DEPT_COLORS={"眼科":"#e74c8b","一般外科":"#e86b2a","直腸外科":"#d4572a","胸腔外科":"#3a7bd5","乳房外科":"#c0478a","小兒外科":"#27ae8f","神經外科":"#7c5fd4","整形外科":"#e0903a","骨科":"#2e86c1","泌尿科":"#16a085","耳鼻喉科":"#d4b030","心臟外科":"#c0392b","口腔外科":"#7d6608","達文西手術":"#1abc9c","婦產科":"#e056a0"};

function renderDepts(){
  const existing=new Set(DATA.map(d=>d.dept));
  const toShow=ALL_DEPTS.filter(d=>d==='全部科別'||existing.has(d));
  document.getElementById('deptWrap').innerHTML=toShow.map(d=>{
    const color=DEPT_COLORS[d]||'#5b8fa8';
    const isActive=currentDept===d;
    const style=d==='全部科別'
      ?(isActive?`background:var(--teal);border-color:var(--teal);color:#fff;`:``)
      :(isActive?`background:${color};border-color:${color};color:#fff;box-shadow:0 2px 8px ${color}40;`:`border-color:${color}60;color:${color};`);
    return`<button class="dept-btn" style="${style}" onclick="setDept('${d}')">${d}</button>`;
  }).join('');
}
function setDept(d){currentDept=d;renderDepts();renderCards();}
function renderFilters(){
  document.getElementById('filterWrap').innerHTML=[{k:'all',l:'全部麻醉'},{k:'etga',l:'ETGA 全身麻醉'},{k:'la',l:'L.A / IVGS 局部'}]
    .map(f=>`<button class="filter-btn ${currentAne===f.k?'active':''}" onclick="setAne('${f.k}')">${f.l}</button>`).join('');
}
function setAne(k){currentAne=k;renderFilters();renderCards();}
function setView(v){
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-item')[{all:0,etga:1,la:2}[v]].classList.add('active');
  setAne(v);
}
function doFilter(){currentSearch=document.getElementById('searchInput').value;renderCards();}
function aneBadge(a){const u=a.toUpperCase();if(u.includes('ETGA'))return`<span class="badge badge-blue">ETGA</span>`;if(u.includes('L.A')||u.includes('IVG'))return`<span class="badge badge-green">L.A/IVG</span>`;return`<span class="badge badge-amber">${a.split(' ')[0]}</span>`;}
function deptBadge(d){const color=DEPT_COLORS[d]||'#5b8fa8';return`<span class="badge" style="background:${color}18;color:${color};border-color:${color}40;font-size:12px;">${d}</span>`;}
function toggleCard(id){openId=openId===id?null:id;renderCards();if(openId)setTimeout(()=>{const el=document.getElementById('card-'+openId);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},60);}
function setQuick(id,m,e){e.stopPropagation();quickMode[id]=m;renderCards();}

function renderRecordInfo(s){
  let parts=[];
  parts.push(`<span>📝 原編著：<strong>${s.author||'—'}</strong></span>`);
  if(s.editor)parts.push(`<span>✏️ 修改者：<strong>${s.editor}</strong>${s.editorDate?' ('+s.editorDate+')':''}</span>`);
  if(s.reviewer)parts.push(`<span>✅ 審核者：<strong>${s.reviewer}</strong>${s.reviewDate?' ('+s.reviewDate+')':''}</span>`);
  return`<div class="record-info">${parts.join('')}</div>`;
}
function diffField(label,oldVal,newVal,colorClass){
  if(!oldVal&&!newVal)return'';
  const oldStr=Array.isArray(oldVal)?oldVal.join(' / '):(oldVal||'');
  const newStr=Array.isArray(newVal)?newVal.join(' / '):(newVal||'');
  if(oldStr===newStr)return'';
  return`<div class="diff-row"><div class="diff-label ${colorClass}">${label}</div><div class="diff-old"><span class="diff-tag old">修改前</span>${oldStr||'（空白）'}</div><div class="diff-new"><span class="diff-tag new">修改後</span><strong style="color:var(--red)">${newStr||'（空白）'}</strong></div></div>`;
}
function renderPendingNotice(s){
  if(!s.pending)return'';
  const canRev=canReviewDept(currentUser,s.dept);
  const p=s.pending;
  let diffs='';
  diffs+=diffField('術式名稱',s.procedure,p.procedure,'c-accent');
  diffs+=diffField('科別',s.dept,p.dept,'c-teal');
  diffs+=diffField('麻醉方式',s.anesthesia,p.anesthesia,'c-blue');
  diffs+=diffField('手術姿勢',s.position,p.position,'c-amber');
  diffs+=diffField('消毒方式',s.disinfect,p.disinfect,'c-teal');
  diffs+=diffField('工具/器械',s.tools,p.tools,'c-accent');
  diffs+=diffField('耗材',s.supplies,p.supplies,'c-green');
  diffs+=diffField('藥物',s.meds,p.meds,'c-red');
  diffs+=diffField('骨材備註',s.implantNotes,p.implantNotes,'c-amber');
  diffs+=diffField('醫生習慣',s.doctorHabits,p.doctorHabits,'c-teal');
  diffs+=diffField('注意事項',s.notes,p.notes,'c-accent');
  const noDiff=diffs===''?'<div style="font-size:13px;color:var(--text3);padding:6px 0;">（無欄位變更）</div>':'';
  return`<div class="pending-notice"><div class="pending-notice-title">⏳ 待審核的修改內容</div><div class="pending-notice-sub">✏️ 修改者：<strong>${p.editor}</strong>（${p.editorDate}）</div>${diffs}${noDiff}${canRev?`<button class="btn-review" onclick="openReview(${s.id},event)">✅ 審核通過，正式公佈</button>`:'<div style="font-size:12px;color:var(--text3);margin-top:8px;">（需等待本科審核者審核）</div>'}</div>`;
}
function renderContent(data){
  return`
    <div class="section"><div class="section-label c-amber">姿勢</div><div class="section-content">${data.position||'—'}</div></div>
    <div class="section"><div class="section-label c-teal">消毒方式</div><div class="section-content">${data.disinfect||'—'}</div></div>
    ${(data.tools&&data.tools.length)?`<div class="section"><div class="section-label c-accent">工具 ／ 器械</div><div class="tags">${data.tools.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>`:''}
    ${(data.supplies&&data.supplies.length)?`<div class="section"><div class="section-label c-green">耗材</div><div class="tags">${data.supplies.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>`:''}
    ${data.meds?`<div class="section"><div class="section-label c-red">藥物</div><div class="section-content" style="color:var(--red);font-weight:600;">${data.meds}</div></div>`:''}
    ${data.implantNotes?`<div class="section"><div class="section-label c-amber">骨材備註</div><div class="section-content">${data.implantNotes}</div></div>`:''}
    ${data.doctorHabits?`<div class="section"><div class="section-label c-teal">醫生習慣</div><div class="section-content">${data.doctorHabits}</div></div>`:''}
    ${data.notes?`<div class="section"><div class="section-label c-accent">注意事項</div><div class="section-content">${data.notes}</div></div>`:''}`;
}
function renderQuickContent(data){
  return`
    <div class="section"><div class="section-label c-amber">麻醉 ／ 姿勢</div><div class="section-content">${data.anesthesia} ｜ ${data.position}</div></div>
    <div class="section"><div class="section-label c-teal">消毒方式</div><div class="section-content">${data.disinfect||'—'}</div></div>
    ${data.meds?`<div class="section"><div class="section-label c-red">藥物</div><div class="section-content" style="color:var(--red);font-weight:600;">${data.meds}</div></div>`:''}`;
}
function renderDetail(s){
  const m=quickMode[s.id]||'full';
  const content=m==='quick'?renderQuickContent(s):renderContent(s);
  return`<div class="card-detail"><div class="quick-strip"><button class="quick-btn ${m==='full'?'qactive':''}" onclick="setQuick(${s.id},'full',event)">📋 完整備料</button><button class="quick-btn ${m==='quick'?'qactive':''}" onclick="setQuick(${s.id},'quick',event)">⚡ 術中快查</button></div>${renderRecordInfo(s)}${renderPendingNotice(s)}${content}</div>`;
}
function renderCards(){
  const f=getFiltered();
  const deptCount=currentDept==='全部科別'?DATA.length:DATA.filter(d=>d.dept===currentDept).length;
  const pendingCount=DATA.filter(d=>d.pending).length;
  let statsHtml=`<div class="stat-pill">顯示 <strong>${f.length}</strong> 筆</div><div class="stat-pill">本科 <strong>${deptCount}</strong> 筆</div><div class="stat-pill">總計 <strong>${DATA.length}</strong> 筆</div>`;
  if(pendingCount>0)statsHtml+=`<div class="stat-pill" style="border-color:var(--amber);color:var(--amber);">⏳ 待審核 <strong>${pendingCount}</strong> 筆</div>`;
  document.getElementById('statsBar').innerHTML=statsHtml;
  const w=document.getElementById('cardsWrap');
  if(!f.length){w.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">找不到符合的術式</div></div>`;return;}
  w.innerHTML=f.map((s,i)=>{
    const hasPending=!!s.pending;
    const statusBadge=s.status==='已審核'?'<span class="badge badge-approved">✓ 已審核</span>':'<span class="badge badge-pending">⏳ 待審核</span>';
    const pendingBadge=hasPending?'<span class="badge badge-draft">📝 有待審版本</span>':'';
    return`<div class="card dept-${s.dept} ${openId===s.id?'open':''} ${hasPending?'has-pending':''}" id="card-${s.id}" style="animation-delay:${i*.02}s"><div class="card-header" onclick="toggleCard(${s.id})"><div class="card-title">${s.procedure}</div><div class="card-header-right"><button class="card-action-btn" onclick="openEdit(${s.id},event)" title="編輯"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><svg class="card-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><polyline points="6 9 12 15 18 9"/></svg></div></div><div class="card-meta">${deptBadge(s.dept)}${aneBadge(s.anesthesia)}<span class="badge badge-pos">📐 ${s.position}</span>${statusBadge}${pendingBadge}</div>${openId===s.id?renderDetail(s):''}</div>`;
  }).join('');
}

function openModal(id=null){
  editingId=id;
  const r=id?DATA.find(d=>d.id===id):null;
  document.getElementById('modalTitle').textContent=id?'編輯術式':'新增術式';
  document.getElementById('f_editor').value=currentUser;
  document.getElementById('f_dept').value=r?.dept||'骨科';
  document.getElementById('f_procedure').value=r?.procedure||'';
  document.getElementById('f_anesthesia').value=r?.anesthesia||'';
  document.getElementById('f_position').value=r?.position||'';
  document.getElementById('f_disinfect').value=r?.disinfect||'';
  document.getElementById('f_tools').value=(r?.tools||[]).join(' / ');
  document.getElementById('f_supplies').value=(r?.supplies||[]).join(' / ');
  document.getElementById('f_meds').value=r?.meds||'';
  document.getElementById('f_implantNotes').value=r?.implantNotes||'';
  document.getElementById('f_doctorHabits').value=r?.doctorHabits||'';
  document.getElementById('f_notes').value=r?.notes||'';
  document.getElementById('modalOverlay').classList.add('show');
}
function openEdit(id,e){e.stopPropagation();openModal(id);}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');editingId=null;}
function saveRecord(){
  const p=document.getElementById('f_procedure').value.trim();
  const a=document.getElementById('f_anesthesia').value.trim();
  if(!p||!a){showToast('⚠️ 術式名稱和麻醉方式為必填');return;}
  const sp=v=>v.split('/').map(t=>t.trim()).filter(Boolean);
  const today=new Date().toLocaleDateString('zh-TW');
  if(editingId){
    const idx=DATA.findIndex(d=>d.id===editingId);
    DATA[idx].pending={dept:document.getElementById('f_dept').value,procedure:p,anesthesia:a,position:document.getElementById('f_position').value.trim(),disinfect:document.getElementById('f_disinfect').value.trim(),tools:sp(document.getElementById('f_tools').value),supplies:sp(document.getElementById('f_supplies').value),meds:document.getElementById('f_meds').value.trim(),implantNotes:document.getElementById('f_implantNotes').value.trim(),doctorHabits:document.getElementById('f_doctorHabits').value.trim(),notes:document.getElementById('f_notes').value.trim(),editor:currentUser,editorDate:today};
    showToast('📝 已送出，等待審核者審核');
  }else{
    const newId=Math.max(0,...DATA.map(d=>d.id))+1;
    const rec={id:newId,dept:document.getElementById('f_dept').value,procedure:p,anesthesia:a,position:document.getElementById('f_position').value.trim(),disinfect:document.getElementById('f_disinfect').value.trim(),tools:sp(document.getElementById('f_tools').value),supplies:sp(document.getElementById('f_supplies').value),meds:document.getElementById('f_meds').value.trim(),implantNotes:document.getElementById('f_implantNotes').value.trim(),doctorHabits:document.getElementById('f_doctorHabits').value.trim(),notes:document.getElementById('f_notes').value.trim(),status:'待審核',author:currentUser,editor:'',editorDate:'',reviewer:'',reviewDate:'',pending:null};
    rec.pending={...rec,editor:currentUser,editorDate:today};
    DATA.push(rec);
    showToast('📝 新術式已送出，等待審核者審核');
  }
  saveData();closeModal();renderDepts();renderCards();updateNotifBanner();
}

function openReview(id,e){
  if(e)e.stopPropagation();
  reviewTargetId=id;
  selectedReviewer=null;
  const s=DATA.find(d=>d.id===id);
  // *** 修正：ADMIN 自己的名字放第一個 ***
  const reviewersList=ADMINS.includes(currentUser)
    ?[currentUser,...(DEPT_REVIEWERS[s.dept]||[]).filter(r=>r!==currentUser)]
    :[currentUser];
  document.getElementById('reviewProcName').textContent=`「${s.pending?.procedure||s.procedure}」`;
  document.getElementById('reviewerList').innerHTML=reviewersList.map(r=>`<button class="reviewer-btn" onclick="selectReviewer('${r}',this)">${r}</button>`).join('');
  document.getElementById('reviewOverlay').classList.add('show');
}
function selectReviewer(name,btn){
  selectedReviewer=name;
  document.querySelectorAll('.reviewer-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}
function closeReview(){document.getElementById('reviewOverlay').classList.remove('show');reviewTargetId=null;selectedReviewer=null;}
function confirmReview(){
  if(!selectedReviewer){showToast('請選擇審核者姓名');return;}
  const idx=DATA.findIndex(d=>d.id===reviewTargetId);
  if(idx<0)return;
  const today=new Date().toLocaleDateString('zh-TW');
  const draft=DATA[idx].pending;
  if(!draft){closeReview();return;}
  Object.assign(DATA[idx],draft);
  DATA[idx].status='已審核';
  DATA[idx].reviewer=selectedReviewer;
  DATA[idx].reviewDate=today;
  DATA[idx].pending=null;
  saveData();closeReview();renderCards();updateNotifBanner();showToast('✅ 審核通過，內容已正式公佈！');
}

function updateNotifBanner(){
  if(!currentUser)return;
  const myPending=DATA.filter(s=>s.pending&&canReviewDept(currentUser,s.dept));
  const banner=document.getElementById('notifBanner');
  if(myPending.length>0){
    banner.classList.remove('hidden');
    document.getElementById('notifTitle').textContent=`你有 ${myPending.length} 筆術式待審核`;
    document.getElementById('notifSub').textContent=`點此查看並審核 → 審核通過後正式公佈`;
  }else{banner.classList.add('hidden');}
}
function openPendingList(){
  if(!currentUser)return;
  const myPending=DATA.filter(s=>s.pending&&canReviewDept(currentUser,s.dept));
  document.getElementById('pendingListSub').textContent=`共 ${myPending.length} 筆術式等待你審核`;
  document.getElementById('pendingListContent').innerHTML=myPending.length===0
    ?'<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">目前沒有待審核的術式</div></div>'
    :myPending.map(s=>`<div class="pending-item"><div class="pending-item-proc">${s.pending.procedure||s.procedure}</div><div class="pending-item-meta"><span>🏥 <strong>${s.dept}</strong></span><span>✏️ 修改者：<strong>${s.pending.editor}</strong></span><span>📅 ${s.pending.editorDate}</span></div><button class="btn-review-now" onclick="closePendingList();openReview(${s.id},event)">立即審核</button></div>`).join('');
  document.getElementById('pendingListOverlay').classList.add('show');
}
function closePendingList(){document.getElementById('pendingListOverlay').classList.remove('show');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))closeModal();});
document.getElementById('reviewOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('reviewOverlay'))closeReview();});
document.getElementById('pendingListOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('pendingListOverlay'))closePendingList();});
</script>
</body>
</html>
