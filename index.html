<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="手術用物手冊">
<meta name="theme-color" content="#1abc9c">
<title>手術室手術用物準備手冊 · 選擇科組</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf8f3; --surface:#fff; --text:#2c2620; --text2:#6b5f54; --text3:#a8998c;
  --border:#e8e2d6; --border2:#d9d0c2; --sans:"Noto Sans TC",sans-serif;
  --rs:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  font-family:var(--sans); background:var(--bg); color:var(--text);
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
  padding:32px 18px 48px;
}
.wrap{width:100%; max-width:480px;}
.head{text-align:center; margin-bottom:8px;}
.logo{font-size:46px; line-height:1; margin-bottom:10px;}
.title{font-size:23px; font-weight:700; letter-spacing:.02em;}
.sub{font-size:16px; color:var(--text3); margin-top:6px;}
.hint{font-size:15px; color:var(--text3); text-align:center; margin:18px 0 22px;}
.grid{display:flex; flex-direction:column; gap:13px;}
.group-btn{
  display:flex; align-items:center; gap:14px;
  background:var(--surface); border:1.5px solid var(--border);
  border-left-width:7px; border-radius:var(--rs);
  padding:16px 16px; cursor:pointer; text-decoration:none; color:var(--text);
  transition:transform .12s, box-shadow .12s, border-color .12s;
  box-shadow:0 1px 2px rgba(44,38,32,.04);
}
.group-btn:active{transform:scale(.985);}
.group-btn:hover{box-shadow:0 4px 14px rgba(44,38,32,.09);}
.dot{
  width:38px; height:38px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:19px; color:#fff; font-weight:700;
}
.gb-text{flex:1; min-width:0;}
.gb-name{font-size:18px; font-weight:700; margin-bottom:3px;}
.gb-depts{font-size:15px; color:var(--text2); line-height:1.45;}
.chev{font-size:22px; color:var(--text3); flex-shrink:0;}
.foot{text-align:center; font-size:13px; color:var(--text3); margin-top:28px; line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="logo">🏥</div>
    <div class="title">手術室手術用物準備手冊</div>
    <div class="sub">請選擇你的科組</div>
  </div>
  <div class="hint">點選色塊進入對應科組的查詢與編輯</div>

  <div class="grid">
    <a class="group-btn" href="App1-Group1.html" style="border-left-color:#27ae60;">
      <div class="dot" style="background:#27ae60;">🟢</div>
      <div class="gb-text">
        <div class="gb-name">第一組 · 綠色</div>
        <div class="gb-depts">眼科 · 耳鼻喉科 · 口腔外科</div>
      </div>
      <div class="chev">›</div>
    </a>

    <a class="group-btn" href="App2-Group2.html" style="border-left-color:#2980b9;">
      <div class="dot" style="background:#2980b9;">🔵</div>
      <div class="gb-text">
        <div class="gb-name">第二組 · 藍色</div>
        <div class="gb-depts">一般外科 · 小兒外科 · 胸腔外科 · 直腸外科 · 婦產科</div>
      </div>
      <div class="chev">›</div>
    </a>

    <a class="group-btn" href="App3-Group3.html" style="border-left-color:#7c5fd4;">
      <div class="dot" style="background:#7c5fd4;">🟣</div>
      <div class="gb-text">
        <div class="gb-name">第三組 · 紫色</div>
        <div class="gb-depts">神經外科 · 整形外科 · 心臟外科</div>
      </div>
      <div class="chev">›</div>
    </a>

    <a class="group-btn" href="App4-Group4.html" style="border-left-color:#d4ac0d;">
      <div class="dot" style="background:#d4ac0d;">🟡</div>
      <div class="gb-text">
        <div class="gb-name">第四組 · 黃色</div>
        <div class="gb-depts">骨科</div>
      </div>
      <div class="chev">›</div>
    </a>

    <a class="group-btn" href="App5-Group5.html" style="border-left-color:#c0392b;">
      <div class="dot" style="background:#c0392b;">🔴</div>
      <div class="gb-text">
        <div class="gb-name">第五組 · 紅色</div>
        <div class="gb-depts">泌尿科 · 達文西手術</div>
      </div>
      <div class="chev">›</div>
    </a>
  </div>

  <div class="foot">修改內容需經各科組長審核後公布<br>各組共用同一資料庫，僅顯示所屬科別</div>
</div>
</body>
</html>
