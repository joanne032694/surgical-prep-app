<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手術用物手冊·群組二</title>
<style>
:root { --accent:#2980b9; --text:#2c2620; --text2:#6b5f54; --text3:#a8998c; --surface:#fff; --bg:#faf8f3; --border:#e8e2d6; --r:12px; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:"Noto Sans TC",sans-serif; background:var(--bg); color:var(--text); }
.login-screen { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; }
.login-screen.hidden { display:none; }
.login-title { font-size:28px; font-weight:700; margin-bottom:20px; }
.login-input { width:100%; max-width:300px; padding:12px; border:1px solid var(--border); border-radius:var(--r); font-size:18px; margin-bottom:12px; }
.login-btn { width:100%; max-width:300px; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:var(--r); font-size:18px; font-weight:700; cursor:pointer; }
.header { padding:14px 16px; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; background:var(--surface); }
.header-title { font-size:22px; font-weight:700; margin-bottom:10px; }
.search-input { width:100%; padding:10px; border:1px solid var(--border); border-radius:var(--r); font-size:16px; }
.dept-wrap { padding:8px 14px; display:grid; grid-template-columns:repeat(2,1fr); gap:6px; }
.dept-btn { padding:8px; border:1px solid var(--border); background:var(--bg); border-radius:var(--r); cursor:pointer; }
.dept-btn.active { background:var(--accent); color:#fff; }
.cards-wrap { padding:12px 14px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:14px; margin-bottom:12px; cursor:pointer; }
.card-title { font-size:18px; font-weight:700; }
.card-meta { font-size:14px; color:var(--text3); margin-top:6px; }
.badge { display:inline-block; padding:3px 8px; background:var(--accent-dim); border-radius:4px; font-size:13px; margin-right:6px; }
.fullpage { display:none; position:fixed; inset:0; background:var(--bg); z-index:150; overflow-y:auto; }
.fullpage.show { display:block; }
.fp-header { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 16px; display:flex; gap:10px; align-items:center; }
.fp-back { width:36px; height:36px; border:1px solid var(--border); border-radius:6px; background:transparent; cursor:pointer; }
.fp-title { font-size:20px; font-weight:700; }
.fp-body { padding:16px; max-width:600px; margin:0 auto; }
.fp-section { margin-bottom:14px; }
.fp-label { font-size:15px; font-weight:700; text-transform:uppercase; color:var(--text3); margin-bottom:6px; }
.fp-content { font-size:16px; background:var(--bg); padding:12px; border-radius:var(--r); border:1px solid var(--border); white-space:pre-wrap; }
.dr-hl { background:#fff3a0; padding:0 2px; font-weight:700; }
.empty { text-align:center; padding:40px; color:var(--text3); }
.user-info { background:var(--bg); padding:8px 16px; display:flex; justify-content:space-between; align-items:center; }
.logout-btn { padding:6px 12px; background:var(--accent); color:#fff; border:none; border-radius:4px; cursor:pointer; }
@media print { .header, .dept-wrap, .fp-header, .logout-btn { display:none; } }
</style>
</head>
<body>

<div class="user-info">
  <span id="userName"></span>
  <button class="logout-btn" id="logoutBtn">登出</button>
</div>

<div class="login-screen" id="loginScreen">
  <div style="font-size:48px; margin-bottom:20px;">🏥</div>
  <h1 class="login-title">手術室手術用物準備手冊</h1>
  <input class="login-input" id="loginName" type="text" placeholder="請輸入姓名">
  <button class="login-btn" id="loginBtn">登入</button>
</div>

<div id="mainApp" style="display:none;">
  <div class="header">
    <div class="header-title">手術用物準備清單 🏥</div>
    <input class="search-input" id="searchInput" type="text" placeholder="搜尋術式、器械...">
  </div>
  <div class="dept-wrap" id="deptWrap"></div>
  <div class="cards-wrap" id="cardsWrap"></div>
</div>

<div class="fullpage" id="fullpage">
  <div class="fp-header">
    <button class="fp-back" id="fpBack">‹ 返回</button>
    <div class="fp-title" id="fpTitle"></div>
  </div>
  <div class="fp-body" id="fpBody"></div>
</div>

let currentUser = null;
let allData = DEFAULT_DATA;
let filteredData = [];
let currentDept = "全部科別";
let currentSearch = "";

window.onload = () => {
  const saved = localStorage.getItem('user_g2');
  if (saved) {
    currentUser = JSON.parse(saved);
    initApp();
  }
};

document.getElementById('loginBtn').onclick = () => {
  const name = document.getElementById('loginName').value.trim();
  if (!name) return alert('請輸入姓名');
  currentUser = { name };
  localStorage.setItem('user_g2', JSON.stringify(currentUser));
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainApp').style.display = 'block';
  initApp();
};

document.getElementById('logoutBtn').onclick = () => {
  localStorage.removeItem('user_g2');
  location.reload();
};

function initApp() {
  document.getElementById('userName').textContent = '👤 ' + currentUser.name;
  
  // 科別按鈕
  const deptWrap = document.getElementById('deptWrap');
  ALL_DEPTS.forEach(dept => {
    const btn = document.createElement('button');
    btn.className = 'dept-btn' + (dept === currentDept ? ' active' : '');
    btn.textContent = dept;
    btn.onclick = () => {
      currentDept = dept;
      document.querySelectorAll('.dept-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateFilter();
    };
    deptWrap.appendChild(btn);
  });
  
  // 搜尋
  document.getElementById('searchInput').oninput = (e) => {
    currentSearch = e.target.value.toLowerCase();
    updateFilter();
  };
  
  // 返回按鈕
  document.getElementById('fpBack').onclick = () => {
    document.getElementById('fullpage').classList.remove('show');
  };
  
  updateFilter();
}

function updateFilter() {
  filteredData = allData.filter(d => {
    if (currentDept !== "全部科別" && d.dept !== currentDept) return false;
    if (currentSearch) {
      const text = (d.procedure + ' ' + (d.anesthesia||'') + ' ' + (d.tools||'')).toLowerCase();
      if (!text.includes(currentSearch)) return false;
    }
    return true;
  });
  renderCards();
}

function renderCards() {
  const wrap = document.getElementById('cardsWrap');
  if (filteredData.length === 0) {
    wrap.innerHTML = '<div class="empty">找不到相符的術式</div>';
    return;
  }
  wrap.innerHTML = filteredData.map(d => `
    <div class="card" onclick="showDetail(${d.id})">
      <div class="card-title">${d.procedure}</div>
      <div class="card-meta">
        <span class="badge">${d.dept}</span>
        ${d.anesthesia ? '<span class="badge">麻: ' + d.anesthesia + '</span>' : ''}
      </div>
    </div>
  `).join('');
}

function showDetail(id) {
  const d = allData.find(x => x.id === id);
  if (!d) return;
  
  document.getElementById('fpTitle').textContent = d.procedure + ' (' + d.dept + ')';
  
  let html = '';
  const addField = (label, value) => {
    if (!value) return;
    html += '<div class="fp-section"><div class="fp-label">' + label + '</div><div class="fp-content">' + hlDr(String(value).replace(/
/g, '<br>')) + '</div></div>';
  };
  
  addField('麻醉方式', d.anesthesia);
  addField('手術姿勢', d.position);
  addField('消毒方式', d.disinfect);
  addField('工具器械', d.tools);
  addField('耗材', d.supplies);
  addField('藥物', d.meds);
  addField('醫生習慣', d.doctorHabits);
  addField('備註', d.implantNotes);
  addField('注意', d.notes);
  
  document.getElementById('fpBody').innerHTML = html;
  document.getElementById('fullpage').classList.add('show');
  window.scrollTo(0, 0);
}
